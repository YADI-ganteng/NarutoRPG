name: Auto-Fix & Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq openjdk-17-jdk python3-pip autoconf automake libtool
        pip install buildozer cython==0.29.37
    
    - name: Create main.py
      run: python3 /dev/stdin <<< "
import os
code = open('main.py','w')
code.write('''from kivy.app import App
from kivy.uix.widget import Widget
from kivy.uix.button import Button
from kivy.uix.label import Label
from kivy.uix.boxlayout import BoxLayout
from kivy.graphics import Color, Rectangle, Ellipse
from kivy.core.window import Window
from kivy.clock import Clock
from random import randint
Window.size=(800,480)
class GameWidget(Widget):
    def __init__(self,**k):
        super().__init__(**k)
        self.p={"x":400,"y":240,"hp":500,"mhp":500,"cp":200,"gold":1000,"lv":1,"kl":0,"sp":5}
        self.en=[{"x":randint(50,750),"y":randint(50,430),"hp":100,"al":True,"n":"Enemy "+str(i)} for i in range(10)]
        self.it=[{"x":randint(100,700),"y":randint(100,380),"t":"$","c":False} for _ in range(10)]
        self.ks=set()
        Window.bind(on_key_down=lambda w,k,*_:self.ks.add(k))
        Window.bind(on_key_up=lambda w,k,*_:self.ks.discard(k))
        Clock.schedule_interval(self.up,1/60)
    def atk(self):
        for e in self.en:
            if not e["al"]:continue
            if abs(self.p["x"]-e["x"])<80:e["hp"]-=40
            if e["hp"]<=0:e["al"]=False;self.p["kl"]+=1;self.p["gold"]+=randint(20,70);break
    def up(self,dt):
        if 275 in self.ks:self.p["x"]+=self.p["sp"]
        if 276 in self.ks:self.p["x"]-=self.p["sp"]
        if 273 in self.ks:self.p["y"]+=self.p["sp"]
        if 274 in self.ks:self.p["y"]-=self.p["sp"]
        if 293 in self.ks:self.atk()
        self.p["x"]=max(20,min(780,self.p["x"]));self.p["y"]=max(20,min(460,self.p["y"]))
        for i in self.it:
            if not i["c"] and abs(self.p["x"]-i["x"])<25:i["c"]=True;self.p["gold"]+=100
        if self.p["cp"]<200:self.p["cp"]+=0.05
        self.draw()
    def draw(self):
        self.canvas.clear()
        with self.canvas:
            Color(0.1,0.1,0.2);Rectangle(pos=(0,0),size=(800,480))
            Color(0.2,0.5,0.2);Rectangle(pos=(0,0),size=(800,80))
            for i in self.it:
                if not i["c"]:Color(1,1,0,0.9);Ellipse(pos=(i["x"]-10,i["y"]-10),size=(20,20))
            for e in self.en:
                if not e["al"]:continue
                Color(0.8,0.2,0.2);Rectangle(pos=(e["x"]-15,e["y"]-20),size=(30,40))
                Color(1,0.7,0.5);Ellipse(pos=(e["x"]-10,e["y"]-30),size=(20,20))
            Color(1,0.42,0.2);Rectangle(pos=(self.p["x"]-15,self.p["y"]-25),size=(30,45))
            Color(1,0.8,0.6);Ellipse(pos=(self.p["x"]-12,self.p["y"]-38),size=(24,24))
            Color(0,0.8,0.3);Rectangle(pos=(self.p["x"]-22,self.p["y"]-48),size=(44*self.p["hp"]/500,5))
class NarutoApp(App):
    def build(self):
        l=BoxLayout(orientation="vertical")
        self.hud=Label(text="Naruto RPG",size_hint=(1,0.1),color=(1,1,1,1))
        self.g=GameWidget()
        l.add_widget(self.hud);l.add_widget(self.g)
        btn=Button(text="ATTACK",size_hint=(1,0.15),background_color=(1,0.2,0.2,1))
        btn.bind(on_press=lambda x:self.g.atk())
        l.add_widget(btn)
        Clock.schedule_interval(lambda dt:self.upd(),0.2)
        return l
    def upd(self):
        p=self.g.p
        self.hud.text=f"HP {int(p['hp'])} | CP {int(p['cp'])} | GOLD {p['gold']} | LV {p['lv']} | KILLS {p['kl']}"
if __name__=="__main__":NarutoApp().run()''')
code.close()
print('main.py created')
"
    
    - name: Setup buildozer.spec
      run: |
        if [ ! -f buildozer.spec ]; then
          buildozer init 2>/dev/null || true
        fi
        sed -i 's/title = .*/title = Naruto RPG/' buildozer.spec
        sed -i 's/package.name = .*/package.name = narutorpg/' buildozer.spec
        sed -i 's/source.include_exts = .*/source.include_exts = py/' buildozer.spec
        sed -i 's/requirements = .*/requirements = python3,kivy==2.2.1/' buildozer.spec
        sed -i 's/android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
        sed -i 's/android.allow_download_worker = False/android.allow_download_worker = True/' buildozer.spec
    
    - name: Build APK
      run: |
        buildozer android debug 2>&1 | grep -E "SUCCESS|ERROR|APK available|FAILED" | head -20
        echo "=== APK FILES ==="
        find . -name "*.apk" -type f -ls
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NarutoRPG-APK
        path: "**/*.apk"
        if-no-files-found: warn
