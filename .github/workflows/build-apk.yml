name: Build APK

on: workflow_dispatch

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Debug - List files
      run: |
        echo "Root files:"
        ls -la
        echo ""
        echo "Find index.html:"
        find . -name "index.html" -type f
        echo ""
        echo "Find all HTML:"
        find . -name "*.html" -type f
    
    - name: Create Android Project
      run: |
        # Cari index.html
        HTML_FILE=$(find . -name "index.html" -type f | head -1)
        echo "Found: $HTML_FILE"
        
        mkdir -p app/src/main/java/com/rpg/naruto
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/assets
        
        # Copy HTML
        if [ -f "$HTML_FILE" ]; then
          cp "$HTML_FILE" app/src/main/assets/index.html
          echo "HTML copied!"
        else
          # Buat HTML sederhana jika tidak ada
          cat > app/src/main/assets/index.html << 'EOF'
          <!DOCTYPE html><html><head><meta charset="UTF-8"><title>Naruto RPG</title>
          <style>body{background:#0a0a1a;color:white;font-family:Arial;text-align:center;padding:50px}
          h1{color:#ff6b35}button{background:#ff6b35;color:white;padding:15px 30px;border:none;border-radius:25px;font-size:18px;margin:10px}</style>
          </head><body><h1>🥷 NARUTO RPG</h1><p>53 Karakter | Battle System | Inventory</p>
          <button onclick="alert('Game Ready!')">⚔️ PLAY</button></body></html>
          EOF
          echo "Default HTML created!"
        fi
        
        # Copy assets
        cp -r characters app/src/main/assets/ 2>/dev/null || mkdir -p app/src/main/assets/characters
        cp -r sounds app/src/main/assets/ 2>/dev/null || mkdir -p app/src/main/assets/sounds
        cp -r effects app/src/main/assets/ 2>/dev/null || mkdir -p app/src/main/assets/effects
        cp -r maps app/src/main/assets/ 2>/dev/null || mkdir -p app/src/main/assets/maps
        cp -r ui app/src/main/assets/ 2>/dev/null || mkdir -p app/src/main/assets/ui
        
        # AndroidManifest
        cat > app/src/main/AndroidManifest.xml << 'MAN'
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android"
            package="com.rpg.naruto">
            <uses-permission android:name="android.permission.INTERNET"/>
            <application android:label="Naruto RPG" android:allowBackup="true" android:theme="@android:style/Theme.Black.NoTitleBar.Fullscreen">
                <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape">
                    <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                </activity>
            </application>
        </manifest>
        MAN
        
        # MainActivity.java
        cat > app/src/main/java/com/rpg/naruto/MainActivity.java << 'JAVA'
        package com.rpg.naruto;
        import android.app.Activity;
        import android.os.Bundle;
        import android.webkit.WebView;
        import android.webkit.WebSettings;
        import android.view.Window;
        import android.view.WindowManager;
        public class MainActivity extends Activity {
            @Override
            protected void onCreate(Bundle s) {
                super.onCreate(s);
                requestWindowFeature(Window.FEATURE_NO_TITLE);
                getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                WebView wv = new WebView(this);
                WebSettings ws = wv.getSettings();
                ws.setJavaScriptEnabled(true);
                ws.setDomStorageEnabled(true);
                ws.setAllowFileAccess(true);
                wv.loadUrl("file:///android_asset/index.html");
                setContentView(wv);
            }
        }
        JAVA
        
        cat > app/src/main/res/values/strings.xml << 'STR'
        <?xml version="1.0" encoding="utf-8"?><resources><string name="app_name">Naruto RPG</string></resources>
        STR
        
        # Build files
        cat > build.gradle << 'ROOT'
        buildscript { repositories { google(); mavenCentral() } dependencies { classpath 'com.android.tools.build:gradle:8.2.0' } }
        allprojects { repositories { google(); mavenCentral() } }
        ROOT
        
        cat > settings.gradle << 'SET'
        rootProject.name = "NarutoRPG"
        include ':app'
        SET
        
        cat > app/build.gradle << 'APP'
        plugins { id 'com.android.application' }
        android { namespace 'com.rpg.naruto' compileSdk 33
            defaultConfig { applicationId "com.rpg.naruto" minSdk 21 targetSdk 33 versionCode 1 versionName "1.0" }
            buildTypes { debug { debuggable true } }
        }
        APP
        
        cat > gradle.properties << 'PROPS'
        android.useAndroidX=true
        org.gradle.jvmargs=-Xmx2048m
        PROPS
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'platforms;android-33 build-tools;33.0.0'
    
    - name: Build APK
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon 2>&1 | tail -20
        echo "=== APK FILES ==="
        find . -name "*.apk" -type f -ls
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NarutoRPG-APK
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: warn
