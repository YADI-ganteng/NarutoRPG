<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>Naruto RPG</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:linear-gradient(135deg,#1a1a2e,#0a0a1a);color:white;font-family:Arial;text-align:center;padding:20px;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center}h1{color:#ff6b35;font-size:2.5em;margin:15px 0;text-shadow:2px 2px 4px rgba(0,0,0,.5)}.card{background:rgba(255,255,255,.08);border-radius:20px;padding:25px;margin:15px;max-width:350px;width:90%;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1)}.hp{font-size:1.5em;margin:10px 0}.bar{width:100%;height:20px;background:#333;border-radius:10px;overflow:hidden;margin:10px 0}.fill{height:100%;background:#4CAF50;width:100%;transition:.3s;border-radius:10px}button{background:#ff6b35;color:white;border:none;padding:15px 30px;font-size:1.1em;border-radius:30px;cursor:pointer;font-weight:bold;margin:8px;width:85%;max-width:300px;transition:.2s}button:active{transform:scale(.95);background:#ff4400}.log{color:#aaa;margin-top:15px;font-size:.9em;min-height:25px}.chars{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:10px 0}.char-btn{background:rgba(255,255,255,.1);color:white;border:2px solid rgba(255,255,255,.2);padding:10px 15px;border-radius:12px;cursor:pointer;font-size:.85em;width:auto}.char-btn:hover,.char-btn.sel{border-color:#ff6b35;background:rgba(255,107,53,.3)}</style></head>
<body><h1>🥷 NARUTO RPG</h1>
<div class="card"><div class="hp">❤️ <span id="hp">500</span>/500</div><div class="bar"><div class="fill" id="bar"></div></div><div class="chars" id="chars"></div></div>
<button onclick="atk(50,'👊 Attack')">👊 ATTACK (-50)</button><button onclick="atk(100,'⚡ Skill')">⚡ SKILL (-100)</button><button onclick="atk(200,'🌟 Ultimate')">🌟 ULTIMATE (-200)</button><button onclick="resetGame()">🔄 RESET</button>
<div class="log" id="log">Pilih karakter & serang!</div>
<script>
var hp=500,mhp=500,chars=['Naruto','Sasuke','Sakura','Kakashi','Itachi','Jiraiya','Tsunade','Orochimaru','Gaara','Lee','Neji','Hinata','Minato','Madara','Pain'],sel='Naruto';
function init(){var c=document.getElementById('chars');chars.forEach(function(n){var b=document.createElement('button');b.className='char-btn';b.textContent=n;b.onclick=function(){sel=n;document.querySelectorAll('.char-btn').forEach(function(x){x.classList.remove('sel')});b.classList.add('sel');log('✅ '+n+' dipilih!')};if(n==sel)b.classList.add('sel');c.appendChild(b)})}
function atk(d,n){if(hp<=0){log('💀 GAME OVER! Reset dulu!');return}hp-=d;if(hp<0)hp=0;updateUI();log(n+': -'+d+' HP | '+sel+' tersisa '+hp+' HP');if(hp<=0)log('💀 '+sel+' KALAH! Tekan RESET!')}
function resetGame(){hp=mhp;updateUI();log('🔄 '+sel+' siap bertarung lagi!')}
function updateUI(){document.getElementById('hp').textContent=hp;document.getElementById('bar').style.width=(hp/mhp*100)+'%';document.getElementById('bar').style.background=hp<100?'#ff4444':'#4CAF50'}
function log(m){document.getElementById('log').textContent=m}
init();log('🎮 Game Ready! Pilih karakter & serang!')
</script></body></html>
