name: Build APK Anti-Timeout

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup & Build
      run: |
        echo "========================================="
        echo "  SETUP & BUILD"
        echo "========================================="
        
        # Install dependencies
        sudo apt-get update -qq
        sudo apt-get install -y -qq openjdk-17-jdk python3-pip autoconf automake libtool
        pip install buildozer cython==0.29.37
        
        # Fix buildozer.spec if needed
        if [ ! -f buildozer.spec ]; then
          buildozer init
          sed -i 's/title = .*/title = Naruto RPG/' buildozer.spec
          sed -i 's/package.name = .*/package.name = narutorpg/' buildozer.spec
          sed -i 's/source.include_exts = .*/source.include_exts = py/' buildozer.spec
          sed -i 's/requirements = .*/requirements = python3,kivy==2.2.1/' buildozer.spec
          sed -i 's/# version = 0.1/version = 1.0/' buildozer.spec
          sed -i 's/android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/android.allow_download_worker = False/android.allow_download_worker = True/' buildozer.spec
        fi
        
        # Create main.py if missing
        if [ ! -f main.py ] || ! grep -q "from kivy" main.py; then
          echo "Creating main.py..."
          cat > main.py << 'PYEOF'
from kivy.app import App
from kivy.uix.widget import Widget
from kivy.uix.button import Button
from kivy.uix.label import Label
from kivy.uix.boxlayout import BoxLayout
from kivy.graphics import Color, Rectangle, Ellipse
from kivy.core.window import Window
from kivy.clock import Clock
from random import randint
Window.size=(800,480)
class GameWidget(Widget):
    def __init__(self,**k):
        super().__init__(**k)
        self.p={"x":400,"y":240,"hp":500,"mhp":500,"cp":200,"gold":1000,"lv":1,"kl":0,"sp":5}
        self.en=[{"x":randint(50,750),"y":randint(50,430),"hp":100,"al":True} for i in range(5)]
        self.it=[{"x":randint(100,700),"y":randint(100,380),"c":False} for _ in range(8)]
        self.ks=set()
        Window.bind(on_key_down=lambda w,k,*_:self.ks.add(k))
        Window.bind(on_key_up=lambda w,k,*_:self.ks.discard(k))
        Clock.schedule_interval(self.up,1/60)
    def atk(self):
        for e in self.en:
            if not e["al"]:continue
            if abs(self.p["x"]-e["x"])<80:e["hp"]-=40
            if e["hp"]<=0:e["al"]=False;self.p["kl"]+=1;break
    def up(self,dt):
        if 275 in self.ks:self.p["x"]+=self.p["sp"]
        if 276 in self.ks:self.p["x"]-=self.p["sp"]
        if 273 in self.ks:self.p["y"]+=self.p["sp"]
        if 274 in self.ks:self.p["y"]-=self.p["sp"]
        if 293 in self.ks:self.atk()
        self.p["x"]=max(20,min(780,self.p["x"]));self.p["y"]=max(20,min(460,self.p["y"]))
        for i in self.it:
            if not i["c"] and abs(self.p["x"]-i["x"])<25:i["c"]=True;self.p["gold"]+=100
        self.draw()
    def draw(self):
        self.canvas.clear()
        with self.canvas:
            Color(0.1,0.1,0.2);Rectangle(pos=(0,0),size=(800,480))
            Color(0.2,0.5,0.2);Rectangle(pos=(0,0),size=(800,80))
            for i in self.it:
                if not i["c"]:Color(1,1,0);Ellipse(pos=(i["x"]-8,i["y"]-8),size=(16,16))
            for e in self.en:
                if not e["al"]:continue
                Color(0.8,0.2,0.2);Rectangle(pos=(e["x"]-12,e["y"]-16),size=(24,32))
            Color(1,0.4,0.2);Rectangle(pos=(self.p["x"]-12,self.p["y"]-20),size=(24,36))
class NarutoApp(App):
    def build(self):
        l=BoxLayout(orientation="vertical")
        self.hud=Label(text="Naruto RPG",size_hint=(1,0.1),color=(1,1,1,1))
        self.g=GameWidget()
        l.add_widget(self.hud);l.add_widget(self.g)
        btn=Button(text="ATTACK",size_hint=(1,0.15),background_color=(1,0.2,0.2,1))
        btn.bind(on_press=lambda x:self.g.atk())
        l.add_widget(btn)
        return l
if __name__=="__main__":NarutoApp().run()
PYEOF
        fi
        
        echo "Files ready!"
        ls -la main.py buildozer.spec 2>/dev/null
        
        # Build with background keep-alive
        echo "Building APK..."
        buildozer android debug &
        BUILD_PID=$!
        
        # Keep-alive loop
        while kill -0 $BUILD_PID 2>/dev/null; do
          sleep 30
          echo "Still building... ($(date +%H:%M:%S))"
        done
        
        wait $BUILD_PID
        BUILD_EXIT=$?
        
        echo "Build exit code: $BUILD_EXIT"
        
        # Find APK
        echo "APK files:"
        find . -name "*.apk" -type f -ls
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NarutoRPG-APK
        path: "*.apk"
        if-no-files-found: warn
    
    - name: Analysis Report
      run: |
        echo "========================================="
        echo "  BUILD REPORT"
        echo "========================================="
        echo "main.py: $(wc -l < main.py 2>/dev/null || echo 0) lines"
        echo "buildozer.spec: $(wc -l < buildozer.spec 2>/dev/null || echo 0) lines"
        if find . -name "*.apk" -type f | grep -q .; then
          echo "BUILD: SUCCESS"
          find . -name "*.apk" -type f -exec ls -la {} \;
        else
          echo "BUILD: FAILED"
          echo "Check log:"
          find . -name "*.log" -type f -exec tail -20 {} \; 2>/dev/null
        fi
