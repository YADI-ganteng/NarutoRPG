async function callAI(messages){const p=AI_PROVIDERS.find(x=>x.name.toLowerCase()===S.currentProvider)||AI_PROVIDERS[0];try{const r=await fetch(p.url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+p.apiKey},body:JSON.stringify({model:p.model,messages:messages.slice(-20),max_tokens:1000,temperature:0.7})});if(!r.ok)return null;const d=await r.json();return d.choices?.[0]?.message?.content||null;}catch(e){return null;}}

function solveMath(text){const t=text.toLowerCase();if(/(\d+)\s*([\+\-\*\/\^])\s*(\d+)/.test(t)){try{return'Hasil: '+eval(text.replace(/\^/g,'**'));}catch(e){}}if(t.includes('faktorial')||t.includes('!')){const m=t.match(/(\d+)\s*!/);if(m){const n=parseInt(m[1]);let f=1;for(let i=2;i<=n;i++)f*=i;return n+'! = '+f.toLocaleString();}}if(t.includes('akar')||t.includes('sqrt')){const m=t.match(/akar\s*(?:dari)?\s*(\d+)/i);if(m)return'Akar '+m[1]+' = '+Math.sqrt(parseFloat(m[1])).toFixed(4);}if(t.includes('sin(')||t.includes('cos(')||t.includes('tan(')){const m=t.match(/(sin|cos|tan)\s*\(\s*(\d+)\s*\)/i);if(m){const fn=m[1].toLowerCase(),val=parseFloat(m[2]);const rad=val*(Math.PI/180);let r;if(fn==='sin')r=Math.sin(rad);else if(fn==='cos')r=Math.cos(rad);else r=Math.tan(rad);return fn+'('+val+') = '+r.toFixed(4);}}return null;}

function solveChemistry(text){const t=text.toLowerCase();const elements={H:{name:'Hidrogen',Z:1,Ar:1.008},He:{name:'Helium',Z:2,Ar:4.0026},C:{name:'Karbon',Z:6,Ar:12.011},N:{name:'Nitrogen',Z:7,Ar:14.007},O:{name:'Oksigen',Z:8,Ar:15.999},Na:{name:'Natrium',Z:11,Ar:22.99},Fe:{name:'Besi',Z:26,Ar:55.845},Au:{name:'Emas',Z:79,Ar:196.97}};for(const[sym,data]of Object.entries(elements)){if(t.includes(sym.toLowerCase())&&(t.includes('apa')||t.includes('unsur')||t.includes('element'))){return data.name+' ('+sym+') - Nomor Atom: '+data.Z+', Massa: '+data.Ar;}}if(t.includes('mr ')||t.includes('massa molekul')){const formula=t.replace(/mr\s*/i,'').trim();let total=0;for(const[sym,data]of Object.entries(elements)){const regex=new RegExp(sym+'(\\d*)','gi');let match;while((match=regex.exec(formula))!==null){const count=match[1]?parseInt(match[1]):1;total+=data.Ar*count;}}if(total>0)return'Mr '+formula+' = '+total.toFixed(2)+' g/mol';}if(t.includes('ph')){const m=t.match(/ph\s*=\s*(\d+\.?\d*)/i);if(m)return'pH = '+m[1]+' -> [H+] = '+Math.pow(10,-parseFloat(m[1])).toExponential(2)+' M';}return null;}

function solvePhysics(text){const t=text.toLowerCase();if(t.includes('kecepatan')){const m=t.match(/(\d+)\s*\/\s*(\d+)/);if(m)return'v = s/t = '+m[1]+'/'+m[2]+' = '+(parseFloat(m[1])/parseFloat(m[2])).toFixed(2)+' m/s';}if(t.includes('gaya')){const m=t.match(/(\d+)\s*[x*]\s*(\d+)/);if(m)return'F = m.a = '+m[1]+' x '+m[2]+' = '+(parseFloat(m[1])*parseFloat(m[2]))+' N';}if(t.includes('energi')||t.includes('einstein')){const m=t.match(/(\d+)\s*kg/);if(m)return'E = mc2 = '+m[1]+' x (3x108)2 = '+(parseFloat(m[1])*9e16).toExponential(2)+' J';}return null;}

function solveCoding(text){const t=text.toLowerCase();if(t.includes('html')&&t.includes('contoh')){return'HTML Example:<br><pre>&lt;!DOCTYPE html&gt;<br>&lt;html&gt;<br>&lt;head&gt;&lt;title&gt;Page&lt;/title&gt;&lt;/head&gt;<br>&lt;body&gt;&lt;h1&gt;Hello!&lt;/h1&gt;&lt;/body&gt;<br>&lt;/html&gt;</pre>';}if(t.includes('css')&&t.includes('contoh')){return'CSS Example:<br><pre>body { background: #000; color: #fff; }<br>.card { padding: 20px; border-radius: 12px; }</pre>';}if((t.includes('javascript')||t.includes('js'))&&t.includes('contoh')){return'JS Example:<br><pre>const name = "Yad AI";<br>console.log("Hello "+name);</pre>';}if(t.includes('python')&&t.includes('contoh')){return'Python Example:<br><pre>name = "Yad AI"<br>print(f"Hello {name}")</pre>';}return null;}

function parseCmd(text){const t=text.toLowerCase().trim();
if(t.startsWith('cari '))return{a:'search',v:t.replace('cari ','')};
if(t.includes(' vs ')||t.startsWith('bandingkan '))return{a:'compare',v:t};

if(t=='foto')return{a:'foto'};if(t=='video')return{a:'video'};

if(t=='short list')return{a:'short_list'};
if(t.includes('youtube.com')||t.includes('youtu.be'))return{a:'youtube',v:t};
if(t.startsWith('ai '))return{a:'switch_ai',v:t.replace('ai ','')};

// TOKEN FIX: support ghp_ dan github_pat_
if(t.startsWith('set github token ')){const token=t.replace('set github token ','').trim();if(token.startsWith('ghp_')||token.startsWith('github_pat_')||token.length>30){return{a:'set_token',v:token};}return{a:'set_token',v:null};}
if(t=='joke')return{a:'joke'};if(t=='fact')return{a:'fact'};if(t=='time')return{a:'time'};
if(t=='quote')return{a:'quote'};if(t.startsWith('hitung '))return{a:'calc',v:t.replace('hitung ','')};
if(t=='markup')return{a:'markup_list'};if(t.startsWith('markup '))return{a:'markup',v:t.replace('markup ','')};
return null;}

async function sendMsg(){if(S.processing)return;const input=$('userInput'),text=input.value.trim();if(!text)return;S.processing=true;input.value='';S.chats++;S.score++;addMsg('user',escHTML(text));const typingDiv=addMsg('ai','Berpikir...');

if(cmd){switch(cmd.a){

case'foto':case'video':setTimeout(()=>openCloudinaryWidget(),300);resp='Upload...';break;
case'short_link':if(!S.isAdmin)resp='Admin only!';else resp=await uploadShort(cmd.v);break;
case'short_list':resp=getShortList();break;
case'youtube':resp=await learnYouTube(cmd.v);break;
case'switch_ai':const pr={deepseek:'DeepSeek',groq:'Groq'};const k=Object.keys(pr).find(x=>cmd.v.includes(x));if(k){S.currentProvider=k;$('ai-badge').textContent=pr[k];toast('AI: '+pr[k],'success');resp='AI: '+pr[k];}else resp='AI: deepseek, groq';break;
case'ai_status':resp='AI: '+S.currentProvider+' | KB: '+S.kb.length;break;
case'deploy_status':resp=await checkDeploy();break;
// TOKEN FIX: terima semua format
case'set_token':if(!cmd.v||cmd.v.length<30)resp='Token invalid!';else{CFG.github.token=cmd.v;localStorage.setItem('gh_token',cmd.v);resp='Token saved: '+cmd.v.substring(0,8)+'...';toast('Token updated!','success');}break;
case'joke':resp=getRandom(["Keys di keyboard!","AI butuh training!","Koma yang ilang!"]);break;
case'fact':resp=getRandom(["AI pertama 1950-an.","2.5 quintillion bytes/hari!","JS dibuat 10 hari!"]);break;
case'time':resp=new Date().toLocaleString('id-ID',{weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});break;
case'quote':resp=getRandom(['"Hidup adalah perjalanan." - Emerson','"Jangan menyerah."']);break;
case'calc':try{resp='Hasil: '+eval(cmd.v);}catch(e){resp='Format: hitung 5+3';}break;
case'markup_list':resp=handleMarkup('20');break;case'markup':resp=handleMarkup(cmd.v);break;
}}
// LOCAL FALLBACK - FIXED
if(!resp){const t=text.toLowerCase();if(/[+\-*\/^]/.test(t)||t.includes('hitung')||t.includes('sin')||t.includes('cos')||t.includes('faktorial')||t.includes('akar'))resp=solveMath(text);else if(t.includes('unsur')||t.includes('atom')||t.includes('mr ')||t.includes('ph ')||t.includes('kimia'))resp=solveChemistry(text);else if(t.includes('kecepatan')||t.includes('gaya')||t.includes('energi')||t.includes('fisika'))resp=solvePhysics(text);else if(t.includes('contoh html')||t.includes('contoh css')||t.includes('contoh javascript')||t.includes('contoh python')||t.includes('coding'))resp=solveCoding(text);}
if(!resp){if(S.activeGame==='tebak-angka'){const g=parseInt(text);if(isNaN(g)){if(text.includes('stop')){S.activeGame=null;resp='Game berakhir! Angka: '+S.gameData.target;}else resp='Masukkan angka!';}else{S.gameData.attempts++;if(g===S.gameData.target){const s=S.gameData.attempts;S.activeGame=null;S.score+=10;resp=s===1?'WOW! SEKALI! '+S.gameData.target+'!':'Benar! '+S.gameData.target+' dalam '+s+' tebakan!';}else resp=g<S.gameData.target?g+' RENDAH!':g+' TINGGI!';}}
else if(S.activeGame==='batu-kertas-gunting'){if(text.includes('stop')){S.activeGame=null;resp='Game berakhir!';}else{const c=['batu','kertas','gunting'];let p=null;if(text.includes('batu'))p='batu';else if(text.includes('kertas'))p='kertas';else if(text.includes('gunting'))p='gunting';if(!p)resp='Pilih: batu, kertas, gunting';else{const ai=c[Math.floor(Math.random()*3)];let r='';if(p===ai)r='SERI!';else if((p==='batu'&&ai==='gunting')||(p==='kertas'&&ai==='batu')||(p==='gunting'&&ai==='kertas')){r='MENANG!';S.score+=5;}else r='AI MENANG!';resp='Kamu: '+p+' | AI: '+ai+' | '+r;}}}
else{const t=text.toLowerCase();if(/^(hai|halo|hi|hello|hallo)/i.test(t))resp='Halo! Ada yang bisa saya bantu?';else if(t.includes('kabar'))resp='Kabar baik! Bagaimana dengan Anda?';else if(t.includes('terima kasih'))resp='Sama-sama!';else if(t.includes('siapa kamu'))resp='Saya Yad AI, asisten virtual.';else if(t.includes('kimia'))resp='Kimia: ilmu tentang materi. Ketik "unsur H" untuk info.';else if(t.includes('fisika'))resp='Fisika: ilmu tentang alam.';else if(t.includes('coding'))resp='Ketik "contoh html" untuk lihat kode.';else resp='Ketik "?" untuk bantuan.';},{role:'user',content:text}]);resp=cr||resp;}}}
typingDiv.remove();addMsg('ai',resp);}catch(e){typingDiv.remove();addMsg('ai','Error: '+e.message);hideProg();}finally{S.processing=false;}}

async function deepSearch(query){showProg('Mencari...',query);const results={web:[],saved:0};try{const r=await fetch('https://api.duckduckgo.com/?q='+encodeURIComponent(query)+'&format=json&no_html=1');if(r.ok){const d=await r.json();if(d.AbstractText)results.web.push({title:d.Heading||query,content:d.AbstractText,source:'DuckDuckGo'});}}catch(e){}try{const r=await fetch('https://id.wikipedia.org/api/rest_v1/page/summary/'+encodeURIComponent(query));if(r.ok){const d=await r.json();if(d.extract)results.web.push({title:d.title,content:d.extract,source:'Wikipedia'});}}catch(e){}for(const w of results.web){try{await fs.collection('knowledge_base').add({title:w.title,content:w.content,tags:['search'],source:w.source,searched_at:new Date().toISOString()});results.saved++;}catch(e){}}hideProg();S.score+=20;let resp='Search: '+query+' ('+results.web.length+' hasil)<br>';results.web.slice(0,3).forEach(w=>resp+='<div class="card"><b>'+w.title+'</b> ('+w.source+')<br>'+w.content.substring(0,150)+'...</div>');return resp;}
async function compareItems(text){const parts=text.split(/ vs | bandingkan | compare /i);if(parts.length<2)return'Format: bandingkan A vs B';const a=parts[0].trim(),b=parts[1].trim();showProg('Membandingkan...',a+' vs '+b);const r=await callAI([{role:'system',content:'Bandingkan dalam bahasa Indonesia.'},{role:'user',content:'Bandingkan: "'+a+'" vs "'+b+'"'}]);hideProg();S.score+=15;return r?(a+' vs '+b+':<br><br>'+r):'Gagal.';}
async function autoDeploy(){showProg('Deploy...');try{await fetch('https://api.github.com/repos/'+CFG.github.owner+'/'+CFG.github.repo+'/dispatches',{method:'POST',headers:{'Authorization':'token '+CFG.github.token,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify({event_type:'deploy-to-firebase',client_payload:{project:'yadstores'}})});hideProg();S.deploys++;S.score+=20;return'Deploy berhasil! Live 1-2 menit.';}catch(e){hideProg();return'Error: '+e.message;}}
async function selfEdit(ins){
    showProg('Self-Edit...',ins);
    try{
        const P='https://cff62bafd0f065.lhr.life/github';
        $('progFill').style.width='30%';
        const fu='https://api.github.com/repos/'+CFG.github.owner+'/'+CFG.github.repo+'/contents/'+CFG.github.filePath+'?ref='+CFG.github.branch;
        const fr=await fetch(P,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({method:'GET',url:fu})});
        const fd=await fr.json();
        if(!fd.ok)throw new Error('Fetch failed');
        const fc=fd.data;
        let nc=atob(fc.content);
        const ti=ins.toLowerCase();
        if(ti.includes('tambah fitur')){const fn=ti.replace(/tambah fitur|add feature/gi,'').trim();if(fn)nc=nc.replace('</body>','<div style="padding:20px;text-align:center;"><h3>'+fn+'</h3></div>\n</body>');}
        if(ti.includes('rename ai')||ti.includes('ubah nama')){const nn=ti.replace(/rename ai|ubah nama|menjadi|ke/gi,'').trim();if(nn){nc=nc.replace(/<title>.*?<\/title>/i,'<title>'+nn+' - AI</title>');nc=nc.replace(/(<span[^>]*>)(Yad AI)(<\/span>)/gi,'$1'+nn+'$3');}}
        $('progFill').style.width='60%';
        const cu='https://api.github.com/repos/'+CFG.github.owner+'/'+CFG.github.repo+'/contents/'+CFG.github.filePath;
        const cr=await fetch(P,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({method:'PUT',url:cu,body:{message:'AI: '+ins.substring(0,80),content:btoa(unescape(encodeURIComponent(nc))),sha:fc.sha,branch:CFG.github.branch}})});
        const cd=await cr.json();
        if(!cd.ok)throw new Error('Commit failed');
        $('progFill').style.width='85%';
        const du='https://api.github.com/repos/'+CFG.github.owner+'/'+CFG.github.repo+'/dispatches';
        await fetch(P,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({method:'POST',url:du,body:{event_type:'deploy-to-firebase',client_payload:{project:'yadstores'}}})});
        $('progFill').style.width='100%';
        await new Promise(r=>setTimeout(r,500));
        hideProg();
        S.edits++;S.deploys++;S.score+=30;
        toast('Self-edit berhasil!','success');
        return '✅ Self-Edit via Proxy! '+ins.substring(0,60)+'...';
    }catch(e){hideProg();return '❌ '+e.message;}
}

async function uploadShort(link){if(!link)return'Link?';if(!link.startsWith('http'))link='https://'+link;showProg('Upload Short...');try{const fd=new FormData();fd.append('file',link);fd.append('upload_preset',CFG.cloudinary.uploadPreset);fd.append('cloud_name',CFG.cloudinary.cloudName);const r=await fetch('https://api.cloudinary.com/v1_1/'+CFG.cloudinary.cloudName+'/auto/upload',{method:'POST',body:fd});const d=await r.json();if(d.secure_url){S.mediaUploads.push({url:d.secure_url,type:d.resource_type,name:d.original_filename||link.split('/').pop(),uploadedAt:new Date().toISOString()});hideProg();return'Short uploaded!<br><video controls style="width:100%;max-width:300px;border-radius:12px;"><source src="'+d.secure_url+'" type="video/mp4"></video>';}hideProg();return'Gagal.';}catch(e){hideProg();return'Error: '+e.message;}}
function getShortList(){const v=S.mediaUploads.filter(m=>m.type==='video');if(!v.length)return'Kosong.';let r='Shorts:<br>';v.slice(-10).reverse().forEach(x=>{r+='<div class="card"><video controls style="width:100%;max-width:300px;border-radius:8px;"><source src="'+x.url+'" type="video/mp4"></video></div>';});return r;}
async function learnYouTube(url){let vid=null;const p=[/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/];for(const pp of p){const m=url.match(pp);if(m){vid=m[1];break;}}if(!vid)return'Link invalid!';const item={title:'Video '+vid,content:'Link: https://youtube.com/watch?v='+vid,tags:['youtube'],type:'lesson',source:'youtube',learned_at:new Date().toISOString()};S.kb.push(item);try{await fs.collection('knowledge_base').add(item);}catch(e){}return'YouTube saved! Total KB: '+S.kb.length;}
function handleTopUp(text){const t=text.toLowerCase();const topup={'mobile-legends':{name:'Mobile Legends',items:[{name:'100 Diamonds',price:25000},{name:'500 Diamonds',price:120000}]},'free-fire':{name:'Free Fire',items:[{name:'100 Diamonds',price:15000}]},'genshin-impact':{name:'Genshin Impact',items:[{name:'Blessing of Welkin',price:75000}]},'pubg-mobile':{name:'PUBG Mobile',items:[{name:'60 UC',price:15000}]},'valorant':{name:'Valorant',items:[{name:'475 VP',price:75000}]}};let game=null,item=null,server=null;const sm=text.match(/server\s*[:#]?\s*(\d+)/i);if(sm)server=sm[1];for(const[k,d]of Object.entries(topup)){if(t.includes(k)||t.includes(d.name.toLowerCase())){game=k;for(const it of d.items){if(t.includes(it.name.toLowerCase())){item=it;break;}}break;}}if(!game||!item){let l='Game:<br>';for(const[k,d]of Object.entries(topup)){l+=d.name+':<br>';d.items.forEach(i=>l+='- '+i.name+': '+fmtPrice(Math.round(i.price*S.markup))+'<br>');l+='<br>';}return l+'"topup ml 100 diamond server: 12345"';}if(!server)return'Server ID?';return'Order!<br>ID: '+genId()+'<br>Game: '+topup[game].name+'<br>Item: '+item.name+'<br>Harga: '+fmtPrice(Math.round(item.price*S.markup));}
function handleMarkup(text){const p=parseInt(text.match(/\d+/)?.[0]||'20');S.markup=1+(p/100);return'Markup '+p+'%';}
function openCloudinaryWidget(){cloudinary.createUploadWidget({cloudName:CFG.cloudinary.cloudName,uploadPreset:CFG.cloudinary.uploadPreset,apiKey:CFG.cloudinary.apiKey,sources:['local','url','camera'],multiple:true,maxFileSize:100000000,styles:{palette:{window:"#141c2b",sourceBg:"#0a0e17",windowBorder:"#2a3545",link:"#4a90d9",action:"#4a90d9",complete:"#2ecc71",error:"#e74c3c",textDark:"#e8edf5",textLight:"#8899aa"}}},function(error,result){if(error)return;if(result&&result.event==='success'){const url=result.info.secure_url,type=result.info.resource_type,name=result.info.original_filename;S.mediaUploads.push({url,type,name,size:result.info.bytes,uploadedAt:new Date().toISOString()});let h='';if(type==='image')h='<div class="card"><img src="'+url+'" style="max-width:100%;border-radius:12px;"><small>'+name+'</small></div>';else if(type==='video')h='<div class="card"><video controls style="max-width:100%;border-radius:12px;"><source src="'+url+'" type="video/mp4"></video><small>'+name+'</small></div>';else h='<div class="card">'+name+'</div>';addMsg('ai',h);toast('Uploaded!','success');}}).open();}
async function autoCheckDB(){try{const s=await fs.collection('knowledge_base').limit(200).get();S.kb=s.docs.map(d=>({id:d.id,...d.data()}));S.dbStats.firebase=S.kb.length;}catch(e){}try{const l=localStorage.getItem('yaidb');if(l)S.dbStats.local=JSON.parse(l).length;}catch(e){}}
async function checkDeploy(){try{const r=await fetch('https://api.github.com/repos/'+CFG.github.owner+'/'+CFG.github.repo+'/actions/runs?per_page=3',{headers:{'Authorization':'token '+CFG.github.token}});if(!r.ok)return'Gagal.';const d=await r.json();if(!d.workflow_runs?.length)return'Belum ada.';let resp='Deploy:<br>';d.workflow_runs.slice(0,3).forEach(run=>{resp+='<div class="card">'+(run.status==='completed'?(run.conclusion==='success'?'OK':'FAIL'):'...')+' '+run.name+'<br>'+run.status+'</div>';});return resp;}catch(e){return'Error: '+e.message;}}


function showLogin(){const e=prompt('Email:');if(!e)return;const p=prompt('Password:');if(!p)return;auth.signInWithEmailAndPassword(e,p).then(()=>toast('Login berhasil!','success')).catch(err=>{if(err.code==='auth/user-not-found'&&confirm('Buat akun?')){auth.createUserWithEmailAndPassword(e,p).then(()=>toast('Akun dibuat!','success')).catch(er=>toast('Error: '+er.message,'error'));}else toast('Error: '+err.message,'error');});}
async function doLogout(){await auth.signOut();toast('Logout!','info');}
auth.onAuthStateChanged(u=>{const s=$('auth-status'),li=$('login-btn'),lo=$('logout-btn');if(u){S.user=u;S.isAdmin=u.email===CFG.adminEmail;S.role=S.isAdmin?'admin':'user';s.className='badge '+S.role;s.textContent=S.isAdmin?'Admin':'User';li.style.display='none';lo.style.display='inline-block';}else{S.isAdmin=false;S.role='guest';s.className='badge guest';s.textContent='Guest';li.style.display='inline-block';lo.style.display='none';}});

$('sendBtn').addEventListener('click',function(e){e.preventDefault();sendMsg();});
$('sendBtn').addEventListener('touchend',function(e){e.preventDefault();sendMsg();});

$('fileInput').addEventListener('change',async function(e){const files=e.target.files;if(!files.length)return;showProg('Upload...');let items=[];for(const file of files){try{const text=await file.text();items=items.concat(parseFile(text,file.name));}catch(err){}}if(items.length){for(const item of items){try{await fs.collection('knowledge_base').add(item);}catch(e){}}S.kb=S.kb.concat(items);const local=[...(JSON.parse(localStorage.getItem('yaidb')||'[]')),...items];localStorage.setItem('yaidb',JSON.stringify(local));S.dbStats.local=local.length;}hideProg();addMsg('ai',items.length+' items! Total: '+S.kb.length);toast(items.length+' items!','success');this.value='';});
function parseFile(text,filename){const items=[];const lines=text.split('\n');let cur={title:filename.replace(/\.[^.]+$/,''),content:'',tags:[],type:'lesson',created_at:new Date().toISOString()};for(let line of lines){line=line.trim();if(!line)continue;if(line.startsWith('===')&&line.endsWith('===')){if(cur.content.trim())items.push({...cur});cur={title:line.replace(/===/g,'').trim(),content:'',tags:[],type:'lesson',created_at:new Date().toISOString()};}else if(line.startsWith('Judul:')||line.startsWith('Title:')){if(cur.content.trim())items.push({...cur});cur={title:line.replace(/^(Judul|Title):/i,'').trim(),content:'',tags:[],type:'lesson',created_at:new Date().toISOString()};}else if(line.startsWith('Tags:')){cur.tags=line.replace('Tags:','').split(',').map(t=>t.trim()).filter(t=>t);}else{cur.content+=line+'\n';}}if(cur.content.trim())items.push(cur);if(!items.length&&text.trim())items.push({title:filename,content:text.trim(),tags:['imported'],type:'lesson',created_at:new Date().toISOString()});return items;}
