<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Naruto Open World RPG</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;height:100vh;touch-action:manipulation;user-select:none;-webkit-user-select:none;font-family:Arial}
canvas{display:block}
#ui{position:fixed;top:0;left:0;right:0;z-index:10;pointer-events:none;padding:5px}
#top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap}
.hud{background:rgba(0,0,0,.7);color:white;padding:4px 8px;border-radius:6px;font-size:10px;margin:1px}
.hp-c{color:#4CAF50}.cp-c{color:#4488ff}.gold-c{color:#ffd700}
#btns{position:fixed;bottom:20px;right:15px;z-index:20;display:flex;flex-direction:column;gap:6px}
.btn{width:50px;height:50px;border-radius:50%;border:none;color:white;font-size:1.2em;cursor:pointer;box-shadow:0 4px 15px rgba(0,0,0,.5)}
.btn:active{transform:scale(.9)}
.btn-atk{background:linear-gradient(135deg,#ff4444,#cc0000)}
.btn-skl{background:linear-gradient(135deg,#4488ff,#0066cc)}
.btn-ult{background:linear-gradient(135deg,#ffaa00,#ff6600)}
.btn-int{background:linear-gradient(135deg,#44aa44,#228822)}
#joy{position:fixed;bottom:25px;left:25px;width:120px;height:120px;z-index:20}
.jb{width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.2)}
.jt{width:50px;height:50px;border-radius:50%;background:rgba(255,107,53,.6);position:absolute;top:35px;left:35px}
#minimap{position:fixed;top:40px;right:8px;width:80px;height:80px;border-radius:50%;border:2px solid #ff6b35;z-index:10;overflow:hidden}
#dialog{position:fixed;bottom:50%;left:50%;transform:translate(-50%,50%);background:rgba(0,0,0,.95);padding:20px;border-radius:15px;z-index:30;display:none;text-align:center;color:white;border:2px solid #ff6b35;max-width:350px;width:90%}
#dialog h3{color:#ff6b35;margin-bottom:8px}
#dialog p{color:#ccc;font-size:.85em;margin-bottom:12px}
#dialog button{background:#ff6b35;color:white;border:none;padding:8px 20px;border-radius:20px;cursor:pointer;margin:4px;font-size:.85em}
#quests{position:fixed;top:40px;left:8px;z-index:10;background:rgba(0,0,0,.7);padding:6px;border-radius:6px;font-size:9px;color:#ffaa00;display:none}
#load{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:white;font-size:1.5em;z-index:100;background:rgba(0,0,0,.8);padding:20px 40px;border-radius:15px}
@media(max-width:600px){#joy{bottom:20px;left:15px;width:100px;height:100px}.jb{width:100px;height:100px}.jt{width:40px;height:40px;top:30px;left:30px}.btn{width:42px;height:42px;font-size:1em}}
</style>
</head>
<body>
<div id="load">⏳ LOADING ASSETS...</div>
<canvas id="c"></canvas>
<div id="ui"><div id="top"><span class="hud hp-c">❤️ <b id="hpT">500</b></span><span class="hud cp-c">💙 <b id="cpT">200</b></span><span class="hud gold-c">💰 <b id="gdT">1000</b></span><span class="hud">⭐ Lv.<b id="lvT">1</b></span><span class="hud">👹 <b id="klT">0</b></span></div></div>
<div id="minimap"><canvas id="mm" width="80" height="80"></canvas></div>
<div id="btns"><button class="btn btn-atk" onclick="attack()">👊</button><button class="btn btn-skl" onclick="skill()">⚡</button><button class="btn btn-ult" onclick="ultimate()">🌟</button><button class="btn btn-int" onclick="interact()">🤝</button></div>
<div id="joy"><div class="jb" id="jsB"><div class="jt" id="jsT"></div></div></div>
<div id="dialog"><h3 id="dT">NPC</h3><p id="dM">...</p><button onclick="acceptQ()">✅ Terima</button><button onclick="closeD()">❌ Tutup</button></div>
<div id="quests"><b>📜 QUESTS</b><div id="qL"></div></div>

<script>
// ===== LOAD ASSETS DARI GITHUB =====
const BASE = 'https://raw.githubusercontent.com/YADI-ganteng/NarutoRPG/main';
let sprites = {};
let sounds = {};
let characters = [];
let assetsLoaded = 0;
let totalAssets = 0;

// Load character JSON
fetch(BASE + '/characters.json')
    .then(r => r.json())
    .then(data => {
        characters = data.map(c => c.name || c);
        console.log('✅ Characters loaded:', characters.length);
        init();
    })
    .catch(() => {
        characters = ["AnimalPath", "Asuma", "AsuraPath", "Chiyo", "Choji", "Choji2", "Deidara", "DevaPath", "Gaara", "Hidan", "Hinata", "Hiruzen", "Ino", "Itachi", "IwaNinja", "Jiraiya", "JiraiyaSage", "Jugo", "Kakashi", "Kakuzu", "Kankuro", "Karin", "Kiba", "Kimimaro", "KiriNinja", "Kisame", "Konan", "KonohaNinja", "KumoNinja", "Lee", "MadaraMusou", "Minato", "Nagato", "Naruto", "NarutoRikudo", "NarutoSage", "Neji", "Orochimaru", "Pain", "Rin", "RockLee", "Sai", "Sakura", "Sasuke", "SasukeImmortal", "Shikamaru", "Shino", "Suigetsu", "SunaNinja", "Tenten", "Tobi", "Tobirama", "Tsunade"];
        console.log('⚠️ Using default characters');
        init();
    });

// Load sprite images
const SPRITE_NAMES = [];
SPRITE_NAMES.forEach(name => {
    totalAssets++;
    let img = new Image();
    img.onload = () => {
        assetsLoaded++;
        updateLoad();
    };
    img.onerror = () => {
        assetsLoaded++;
        updateLoad();
    };
    img.src = BASE + '/sprites/' + name;
    sprites[name.replace('.png','')] = img;
});

function updateLoad() {
    let pct = Math.floor(assetsLoaded / totalAssets * 100);
    document.getElementById('load').textContent = '⏳ LOADING... ' + pct + '%';
    if (assetsLoaded >= totalAssets) {
        document.getElementById('load').style.display = 'none';
    }
}

// ===== GAME ENGINE =====
const c=document.getElementById('c'),ctx=c.getContext('2d');
const mm=document.getElementById('mm'),mmc=mm.getContext('2d');
function rs(){c.width=innerWidth;c.height=innerHeight}
rs();window.addEventListener('resize',rs);

const W=4000,H=3000;
let particles=[],dmgNums=[],shake=0;
let P={x:W/2,y:H/2,w:30,h:40,spd:5,hp:500,mhp:500,cp:200,mcp:200,gold:1000,lv:1,exp:0,kills:0,dir:0,af:0,at:0,inv:0};
let trees=[],rocks=[],houses=[],npcs=[],enemies=[],items=[];

function init() {
    for(let i=0;i<80;i++)trees.push({x:Math.random()*W,y:Math.random()*H,s:15+Math.random()*35});
    for(let i=0;i<30;i++)rocks.push({x:Math.random()*W,y:Math.random()*H,s:10+Math.random()*25});
    for(let i=0;i<6;i++)houses.push({x:200+i*400,y:300+Math.random()*1500,w:100,h:70});
    
    const NQ=[{n:'Kakashi',q:'Kalahkan 5 ninja!',r:'Bagus!'},{n:'Tsunade',q:'Cari ramuan obat.',r:'Terima kasih!'},{n:'Jiraiya',q:'Latih jurus baru!',r:'Kamu hebat!'},{n:'Iruka',q:'Antar surat ke timur.',r:'Sampai!'},{n:'Guy',q:'Lari 10 putaran!',r:'Semangat!'},{n:'Shikamaru',q:'Pecahkan teka-teki.',r:'Pintar!'},{n:'Hinata',q:'Kumpulkan bunga.',r:'Arigatou!'},{n:'Yamato',q:'Bangun jembatan.',r:'Selesai!'}];
    NQ.forEach((d,i)=>{npcs.push({x:200+Math.random()*(W-400),y:200+Math.random()*(H-400),name:d.n,quest:d.q,reward:d.r,done:false,ac:false,color:'#'+((Math.random()*0xFFFFFF)>>0).toString(16)})});
    
    for(let i=0;i<50;i++){enemies.push({x:Math.random()*W,y:Math.random()*H,hp:60+Math.random()*120,mhp:150,name:['Bandit','Ninja Liar','Ronin','Penjahat'][Math.floor(Math.random()*4)]+' '+(i+1),alive:true,spd:1+Math.random()*2,dir:Math.random()*Math.PI*2,wt:0,aggro:false})};
    for(let i=0;i<35;i++){items.push({x:Math.random()*W,y:Math.random()*H,type:['💊','💰','⚔️','💎','🍃','💣'][Math.floor(Math.random()*6)],collected:false,bob:Math.random()*Math.PI*2})};
    
    document.getElementById('load').style.display='none';
    requestAnimationFrame(loop);
}

// Joystick
let jx=0,jy=0;
const jsB=document.getElementById('jsB'),jsT=document.getElementById('jsT');
function ujs(t){let r=jsB.getBoundingClientRect();let cx=r.left+r.width/2,cy=r.top+r.height/2;let dx=t.clientX-cx,dy=t.clientY-cy;let d=Math.sqrt(dx*dx+dy*dy),md=35;if(d>md){dx=dx/d*md;dy=dy/d*md}jsT.style.left=(35+dx)+'px';jsT.style.top=(35+dy)+'px';jx=dx/md;jy=dy/md}
jsB.addEventListener('touchstart',e=>{e.preventDefault();ujs(e.touches[0])});
jsB.addEventListener('touchmove',e=>{e.preventDefault();ujs(e.touches[0])});
jsB.addEventListener('touchend',()=>{jx=0;jy=0;jsT.style.left='35px';jsT.style.top='35px'});

let keys={};
window.addEventListener('keydown',e=>{keys[e.key]=true});
window.addEventListener('keyup',e=>{keys[e.key]=false});

function attack(){action(35,'👊','#ff4444')}
function skill(){if(P.cp>=30){P.cp-=30;action(80,'⚡','#4488ff')}}
function ultimate(){if(P.cp>=100){P.cp-=100;action(180,'🌟','#ffaa00')}}

function action(dmg,name,color){
    if(P.inv>0)return;
    shake=Math.max(shake,dmg/5);
    let target=null,minD=100;
    for(let e of enemies){if(!e.alive)continue;let dx=P.x-e.x,dy=P.y-e.y;let d=Math.sqrt(dx*dx+dy*dy);if(d<minD){minD=d;target=e}}
    if(target){target.hp-=dmg;target.aggro=true;dmgNums.push({x:target.x,y:target.y-30,text:'-'+dmg,color:color,life:1});
        for(let i=0;i<8;i++)particles.push({x:target.x,y:target.y,vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*6-2,life:.5,color:color,s:3+Math.random()*5});
        if(target.hp<=0){target.alive=false;P.exp+=50;P.kills++;P.gold+=20+Math.floor(Math.random()*50);
            for(let i=0;i<15;i++)particles.push({x:target.x,y:target.y,vx:(Math.random()-.5)*10,vy:(Math.random()-.5)*8-3,life:.8,color:'#ff4444',s:2+Math.random()*5});
            if(P.exp>=P.lv*100){P.lv++;P.exp=0;P.mhp+=50;P.hp=P.mhp;P.mcp+=20;P.cp=P.mcp;dmgNums.push({x:P.x,y:P.y-50,text:'LEVEL UP!',color:'#ffd700',life:2})}}}
}

let curN=null;
function interact(){for(let n of npcs){let dx=P.x-n.x,dy=P.y-n.y;if(Math.sqrt(dx*dx+dy*dy)<70){curN=n;document.getElementById('dT').textContent=n.name;document.getElementById('dM').textContent=n.done?n.reward:n.quest;document.getElementById('dialog').style.display='block';return}}}
function acceptQ(){if(curN&&!curN.ac){curN.ac=true;document.getElementById('quests').style.display='block';updateQ()}closeD()}
function closeD(){document.getElementById('dialog').style.display='none';curN=null}
function updateQ(){let l=document.getElementById('qL');l.innerHTML='';npcs.filter(n=>n.ac&&!n.done).forEach(n=>{l.innerHTML+='<div>📜 '+n.name+': '+n.quest.substring(0,15)+'...</div>'})}

function update(dt){
    let kx=0,ky=0;
    if(keys['w']||keys['ArrowUp'])ky=-1;if(keys['s']||keys['ArrowDown'])ky=1;
    if(keys['a']||keys['ArrowLeft'])kx=-1;if(keys['d']||keys['ArrowRight'])kx=1;
    let mx=jx||kx,my=jy||ky;
    if(mx!==0||my!==0){P.x+=mx*P.spd;P.y+=my*P.spd;P.dir=Math.atan2(my,mx);P.at+=dt;if(P.at>.15){P.at=0;P.af=(P.af+1)%4}}
    P.x=Math.max(0,Math.min(W,P.x));P.y=Math.max(0,Math.min(H,P.y));
    if(P.inv>0)P.inv-=dt;
    if(P.cp<P.mcp)P.cp+=.05;if(P.hp<P.mhp)P.hp+=.03;
    
    enemies.forEach(e=>{if(!e.alive)return;let dx=P.x-e.x,dy=P.y-e.y;let d=Math.sqrt(dx*dx+dy*dy);
        if(d<300&&!e.aggro&&Math.random()<.01)e.aggro=true;
        if(e.aggro&&d<300){e.x+=dx/d*e.spd;e.y+=dy/d*e.spd;if(d<50&&P.inv<=0){P.hp-=8;P.inv=.5;dmgNums.push({x:P.x,y:P.y-30,text:'-8',color:'#ff4444',life:.8});if(P.hp<=0){P.hp=P.mhp;P.x=W/2;P.y=H/2;P.gold=Math.floor(P.gold*.8)}}}
        else if(!e.aggro){e.wt-=dt;if(e.wt<=0){e.dir=Math.random()*Math.PI*2;e.wt=2+Math.random()*3}e.x+=Math.cos(e.dir)*e.spd*.5;e.y+=Math.sin(e.dir)*e.spd*.5}
        e.x=Math.max(0,Math.min(W,e.x));e.y=Math.max(0,Math.min(H,e.y))});
    
    npcs.forEach(n=>{if(n.ac&&!n.done&&P.kills>=5)n.done=true});
    items.forEach(it=>{if(it.collected)return;let dx=P.x-it.x,dy=P.y-it.y;if(Math.sqrt(dx*dx+dy*dy)<35){it.collected=true;if(it.type==='💰')P.gold+=100;if(it.type==='💊')P.hp=Math.min(P.mhp,P.hp+50);if(it.type==='💎')P.gold+=500;dmgNums.push({x:it.x,y:it.y,text:it.type,color:'#ffd700',life:1})}});
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=dt});particles=particles.filter(p=>p.life>0);
    dmgNums.forEach(d=>{d.y-=1;d.life-=dt});dmgNums=dmgNums.filter(d=>d.life>0);
    shake*=.9;
    
    document.getElementById('hpT').textContent=Math.floor(P.hp);
    document.getElementById('cpT').textContent=Math.floor(P.cp);
    document.getElementById('gdT').textContent=P.gold;
    document.getElementById('lvT').textContent=P.lv;
    document.getElementById('klT').textContent=P.kills;
}

let cam={x:0,y:0};
function draw(){
    cam.x=P.x-innerWidth/2;cam.y=P.y-innerHeight/2;
    let sx=(Math.random()-.5)*shake,sy=(Math.random()-.5)*shake;
    ctx.save();ctx.translate(sx,sy);ctx.clearRect(0,0,innerWidth,innerHeight);
    
    ctx.fillStyle='#3a7a2a';ctx.fillRect(0,0,innerWidth,innerHeight);
    ctx.fillStyle='#4a8a3a';
    for(let x=-cam.x%40;x<innerWidth;x+=40)for(let y=-cam.y%40;y<innerHeight;y+=40)if((Math.floor((x+cam.x)/40)+Math.floor((y+cam.y)/40))%3===0)ctx.fillRect(x,y,20,20);
    ctx.fillStyle='#9B8B6B';ctx.fillRect(50-cam.x,H/2-cam.y,W-100,80);ctx.fillRect(W/2-cam.x,50-cam.y,80,H-100);
    
    houses.forEach(h=>{let hx=h.x-cam.x,hy=h.y-cam.y;ctx.fillStyle='#8B6914';ctx.fillRect(hx,hy,h.w,h.h);ctx.fillStyle='#A0792A';ctx.fillRect(hx+15,hy+30,30,25);ctx.fillStyle='#CC4444';ctx.beginPath();ctx.moveTo(hx-10,hy);ctx.lineTo(hx+h.w/2,hy-35);ctx.lineTo(hx+h.w+10,hy);ctx.fill()});
    trees.forEach(t=>{let tx=t.x-cam.x,ty=t.y-cam.y;ctx.fillStyle='#5a3a1a';ctx.fillRect(tx-4,ty,t.s*.15,t.s*.7);ctx.fillStyle='#3a8a3a';ctx.beginPath();ctx.arc(tx,ty-t.s*.3,t.s*.4,0,Math.PI*2);ctx.fill();ctx.fillStyle='#4a9a4a';ctx.beginPath();ctx.arc(tx+5,ty-t.s*.25,t.s*.3,0,Math.PI*2);ctx.fill()});
    rocks.forEach(r=>{ctx.fillStyle='#777';ctx.beginPath();ctx.arc(r.x-cam.x,r.y-cam.y,r.s*.3,0,Math.PI*2);ctx.fill()});
    items.forEach(it=>{if(it.collected)return;let bob=Math.sin(Date.now()/500+it.bob)*5;ctx.font='22px Arial';ctx.fillText(it.type,it.x-15-cam.x,it.y+8+bob-cam.y)});
    
    npcs.forEach(n=>{
        let nx=n.x-cam.x,ny=n.y-cam.y;
        // Pakai sprite kalau ada
        if(sprites[n.name]){
            ctx.drawImage(sprites[n.name],nx-20,ny-30,40,50);
        } else {
            ctx.fillStyle=n.ac?'#4CAF50':n.color;ctx.fillRect(nx-15,ny-25,30,45);
            ctx.fillStyle='#FFDDBB';ctx.beginPath();ctx.arc(nx,ny-30,12,0,Math.PI*2);ctx.fill();
            ctx.fillStyle='#000';ctx.fillRect(nx-5,ny-33,4,4);ctx.fillRect(nx+1,ny-33,4,4);
        }
        ctx.fillStyle='white';ctx.font='9px Arial';ctx.fillText(n.name,nx-12,ny-40);
        if(n.ac&&!n.done){ctx.fillStyle='#ffaa00';ctx.font='14px Arial';ctx.fillText('!',nx+10,ny-35)}
        if(n.done){ctx.fillStyle='#4CAF50';ctx.font='14px Arial';ctx.fillText('✓',nx+10,ny-35)}
    });
    
    enemies.forEach(e=>{if(!e.alive)return;let ex=e.x-cam.x,ey=e.y-cam.y;ctx.fillStyle=e.aggro?'#ff2222':'#cc4444';ctx.fillRect(ex-14,ey-22,28,40);ctx.fillStyle='#FFCCAA';ctx.beginPath();ctx.arc(ex,ey-26,10,0,Math.PI*2);ctx.fill();ctx.fillStyle=e.aggro?'#ff0':'#000';ctx.fillRect(ex-4,ey-29,3,3);ctx.fillRect(ex+1,ey-29,3,3);ctx.fillStyle='#333';ctx.fillRect(ex-20,ey-40,40,6);ctx.fillStyle='#ff0000';ctx.fillRect(ex-20,ey-40,40*(e.hp/e.mhp),6)});
    
    // Player dengan sprite
    let px=P.x-cam.x,py=P.y-cam.y;
    if(sprites['Naruto']){
        ctx.drawImage(sprites['Naruto'],px-25,py-35,50,60);
    } else {
        ctx.fillStyle='rgba(0,0,0,.3)';ctx.ellipse(px,py+22,14,5,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#ff6b35';ctx.fillRect(px-14,py-25,28,35);
        ctx.fillStyle='#FFDDBB';ctx.beginPath();ctx.arc(px,py-30,14,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#ffdd00';ctx.beginPath();ctx.arc(px,py-33,14,Math.PI,0);ctx.fill();
    }
    ctx.fillStyle='#333';ctx.fillRect(px-22,py-50,44,8);ctx.fillStyle='#4CAF50';ctx.fillRect(px-22,py-50,44*(P.hp/P.mhp),8);
    
    particles.forEach(p=>{ctx.fillStyle=p.color;ctx.globalAlpha=Math.max(0,p.life/.5);ctx.beginPath();ctx.arc(p.x-cam.x,p.y-cam.y,p.s,0,Math.PI*2);ctx.fill()});ctx.globalAlpha=1;
    dmgNums.forEach(d=>{ctx.fillStyle=d.color;ctx.globalAlpha=d.life;ctx.font='bold 14px Arial';ctx.fillText(d.text,d.x-cam.x,d.y-cam.y)});ctx.globalAlpha=1;
    ctx.restore();
    
    mmc.fillStyle='rgba(0,0,0,.6)';mmc.fillRect(0,0,80,80);
    let sx2=80/W,sy2=80/H;
    mmc.fillStyle='#ff4444';enemies.forEach(e=>{if(e.alive)mmc.fillRect(e.x*sx2,e.y*sy2,2,2)});
    mmc.fillStyle='#4CAF50';npcs.forEach(n=>{mmc.fillRect(n.x*sx2,n.y*sy2,2,2)});
    mmc.fillStyle='#ff6b35';mmc.fillRect(P.x*sx2-2,P.y*sy2-2,4,4);
}

let lt=0;
function loop(t){let dt=Math.min((t-lt)/1000,.1);lt=t;update(dt);draw();requestAnimationFrame(loop)}
</script>
</body>
</html>
