        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg-primary); color:var(--text-primary); height:100vh; width:100vw; overflow:hidden; position:fixed; top:0; left:0; }

        .header { background:linear-gradient(135deg,#0f1729,#1a2332); padding:12px 16px; border-bottom:1px solid var(--border-color); display:flex; justify-content:space-between; align-items:center; z-index:20; min-height:56px; }
        .header-left { display:flex; align-items:center; gap:12px; }
        .ai-avatar { width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple)); display:flex; align-items:center; justify-content:center; font-size:18px; animation:glow 2s infinite; }

        .header-title { font-size:15px; font-weight:700; }
        .header-title span { background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .header-right { display:flex; align-items:center; gap:8px; }

        .badge.admin { background:rgba(124,92,231,0.15); border-color:var(--accent-purple); color:var(--accent-purple); }
        .badge.user { background:rgba(46,204,113,0.15); border-color:var(--accent-green); color:var(--accent-green); }
        .badge.guest { background:rgba(136,153,170,0.15); border-color:var(--text-secondary); color:var(--text-secondary); }
        .btn-icon { padding:6px 12px; border-radius:20px; border:1px solid var(--border-color); background:transparent; color:var(--text-primary); cursor:pointer; font-size:10px; }
        .btn-icon:active { transform:scale(0.95); }
        .chat-area { flex:1; display:flex; flex-direction:column; background:var(--bg-primary); min-height:0; }
        .chat-messages { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; scroll-behavior:smooth; }

        .message { max-width:85%; animation:slideUp 0.4s ease; line-height:1.6; word-wrap:break-word; }
        @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        .message.user { margin-left:auto; background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple)); color:white; padding:12px 16px; border-radius:20px 20px 4px 20px; font-size:13px; }
        .message.ai { margin-right:auto; background:var(--bg-secondary); border:1px solid var(--border-color); padding:12px 16px; border-radius:20px 20px 20px 4px; font-size:13px; }
        .message .card { background:var(--bg-tertiary); padding:10px; border-radius:10px; margin:8px 0; border:1px solid var(--border-color); font-size:11px; }
        .message .card.success { border-color:var(--accent-green); background:rgba(46,204,113,0.1); }

        .message .card.warning { border-color:var(--accent-gold); background:rgba(243,156,18,0.1); }
        .message code { background:#0a0e17; padding:2px 6px; border-radius:4px; font-family:monospace; font-size:10px; color:var(--accent-green); }
        .message a { color:var(--accent-cyan); text-decoration:none; }
        .input-area { padding:12px 16px; padding-bottom:calc(12px + var(--safe-bottom)); background:var(--bg-secondary); border-top:1px solid var(--border-color); display:flex; gap:10px; align-items:center; }
        .input-area input { flex:1; padding:12px 18px; background:var(--bg-primary); border:2px solid var(--border-color); border-radius:24px; color:var(--text-primary); font-size:14px; outline:none; font-family:inherit; }
        .input-area input:focus { border-color:var(--accent-blue); }
        .send-btn { width:46px; height:46px; border-radius:50%; border:none; background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple)); color:white; cursor:pointer; font-size:20px; display:flex; align-items:center; justify-content:center; }

        @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-30px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
        .toast.success { background:rgba(46,204,113,0.95); } .toast.error { background:rgba(231,76,60,0.95); } .toast.info { background:rgba(74,144,217,0.95); }
        .progress-overlay { position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:50; }
        .progress-overlay.active { display:flex; }
        .progress-card { background:var(--bg-secondary);padding:32px;border-radius:20px;text-align:center;width:320px;border:1px solid var(--border-color); }
        .progress-bar { width:100%;height:6px;background:var(--bg-tertiary);border-radius:3px;margin:16px 0;overflow:hidden; }
        .progress-fill { height:100%;background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple));width:0%;transition:width 0.5s; }
        .typing-indicator { display:inline-flex;gap:4px;padding:4px 0; }

        .typing-indicator span:nth-child(2){animation-delay:0.2s} .typing-indicator span:nth-child(3){animation-delay:0.4s}
        @keyframes typing { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-10px);opacity:1} }

    async function deployToGithub() {

                    message: 'Deploy Yad AI v8.5 - ' + new Date().toISOString(),

                    sha: sha,

                hideProg();
                const err = await putRes.json();

            }

                    await fs.collection('deployments').add({

    // ================================================================

    async function callAIAPI(prompt, idx = 0) {
        const api = CFG.aiApis[idx];
        if (!api) return null;
        try {
            const res = await fetch(api.url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${api.key}` },
                body: JSON.stringify({ model: api.model, messages: [{ role:'system', content:'Kamu Yad AI, asisten Indonesia ramah.' }, { role:'user', content:prompt }], max_tokens: 1000, temperature: 0.8 })
            });
            if (res.ok) { const d = await res.json(); return d.choices[0].message.content; }
        } catch(e) {}
        return idx < CFG.aiApis.length-1 ? await callAIAPI(prompt, idx+1) : null;
    }

    // ================================================================
    // DUCKDUCKGO
    // ================================================================
    async function searchDDG(query) {
        try {
            const res = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1`);
            if (!res.ok) return null;
            const data = await res.json();
            const results = [];
            if (data.AbstractText && data.AbstractText.length > 10) results.push({ title: data.Heading || query, content: data.AbstractText, url: data.AbstractURL || '' });
            if (data.RelatedTopics) data.RelatedTopics.slice(0,5).forEach(t => { if(t.Text&&t.Text.length>10) results.push({ title: t.FirstURL?.split('/').pop()?.replace(/_/g,' ')||query, content: t.Text }); });
            return results;
        } catch(e) { return null; }
    }

        }
        return r;
    }

        if (t.includes('kamu siapa')) return 'Aku Yad AI v8.5! Deploy GitHub & Firestore lancar! 🚀';
        if (t.includes('pantun')) return '🎭 Jalan-jalan ke kota Medan<br>Jangan lupa beli durian<br>Kalau kamu lagi kesepian<br>Chat aku aja jadi teman 😄';
        
        return getRandom(['Ceritakan lebih lanjut! 🎮','Aku ngerti. Lanjutkan! 💙','Interesting! ☕']);
    }

    function handleTebakAngka(t) {
        const g = parseInt(t);
        if (isNaN(g)) { if(t.includes('stop')){const tg=S.gameData.target;S.activeGame=null;return `Game selesai! Angkanya: ${tg}`;} return 'Masukkan angka 1-100!'; }
        S.gameData.attempts++;
        if(g===S.gameData.target){const sc=Math.max(100-S.gameData.attempts*10,10);S.score+=sc;S.activeGame=null;return `🎉 BENAR! ${g} dalam ${S.gameData.attempts} tebakan. +${sc} poin!`;}
        return `${g} terlalu ${g<S.gameData.target?'RENDAH 📈':'TINGGI 📉'} | Ke-${S.gameData.attempts}`;
    }

    function handleBKG(t) {
        if(t.includes('stop')){S.activeGame=null;return 'Game selesai!';}
        const c=['batu','kertas','gunting'];let p=null;
        if(t.includes('batu'))p='batu';else if(t.includes('kertas'))p='kertas';else if(t.includes('gunting'))p='gunting';
        if(!p)return 'Pilih: ✊ batu, ✋ kertas, ✌️ gunting?';
        const ai=c[Math.floor(Math.random()*3)];const e={batu:'✊',kertas:'✋',gunting:'✌️'};
        if(p===ai){S.score+=1;return `${e[p]} vs ${e[ai]} - SERI!`;}
        if((p==='batu'&&ai==='gunting')||(p==='kertas'&&ai==='batu')||(p==='gunting'&&ai==='kertas')){S.score+=5;return `${e[p]} vs ${e[ai]} - MENANG! 🎉`;}
        return `${e[p]} vs ${e[ai]} - KALAH!`;
    }

    // ================================================================
    // COMMAND HANDLER
    // ================================================================
    async function handleCommand(text) {
        const t = text.toLowerCase().trim();
        
        // DEPLOY COMMANDS
        if (t === 'deploy' || t === 'deploy github') return await deployToGithub();
        if (t === 'deploy firebase' || t === 'deploy db') return await deployToFirestore();
        if (t === 'deploy all') {
            const r1 = await deployToFirestore();
            const r2 = await deployToGithub();
            return r1 + '<br>' + r2;
        }
        
        // TOKEN COMMANDS
        if (t === 'token' || t === 'cek token') return await testToken();
        if (t === 'token help') return `🔑 Token: ${GITHUB_TOKEN.substring(0,10)}...${GITHUB_TOKEN.substring(GITHUB_TOKEN.length-5)}`;
        
        // SEARCH
        if (t.startsWith('cari ')||t.startsWith('search ')) return await deepSearch(t.replace('cari ','').replace('search ',''));
        
        // OTHER
        if (t === 'stats') return `📊 Chat: ${S.chats} | ⭐ Score: ${S.score} | 🔢 Deploy: ${S.deployCount} | 🤖 AI: ${CFG.aiApis[S.currentAI].name}`;
        if (t === '?'||t==='help') return `<b>📚 Commands:</b><br>🚀 <code>deploy</code> - Deploy GitHub<br>🔥 <code>deploy firebase</code> - Deploy Firestore<br>🚀 <code>deploy all</code> - Deploy keduanya<br>🔑 <code>token</code> - Test token<br>🔍 <code>cari [topik]</code> - Search<br>🎮 <code>main [game]</code> - Play<br>💰 <code>topup</code> - Top up<br>🤖 <code>ai</code> - Switch AI<br>🎯 <code>joke/time</code> - Fun`;
        if (t.startsWith('main ')) { const g=t.replace('main ',''); if(g.includes('tebak')||g.includes('angka')){S.activeGame='tebak-angka';S.gameData={target:Math.floor(Math.random()*100)+1,attempts:0};return '🎲 Tebak 1-100!';} if(g.includes('batu')||g.includes('gunting')||g.includes('kertas')){S.activeGame='batu-kertas-gunting';return '✊✋✌️ Pilih!';} }
        if (t.includes('topup')) return '<b>💰 Top Up:</b><br>ML: 100💎=Rp30rb<br>FF: 100💎=Rp18rb<br>GI: Blessing=Rp90rb<br>PUBG: 60UC=Rp18rb<br>Valo: 475VP=Rp90rb';
        if (t.startsWith('ai ')) { const n=t.replace('ai ',''); for(let i=0;i<CFG.aiApis.length;i++){if(n.includes(CFG.aiApis[i].name.toLowerCase())){S.currentAI=i;return `✅ AI: ${CFG.aiApis[i].name}`;}} }
        if (t==='ai') { let l='🤖 <b>AI:</b><br>'; CFG.aiApis.forEach((a,i)=>l+=`${i===S.currentAI?'✅ ':''}${a.name}<br>`); return l; }
        if (t==='joke') return getRandom(['Kenapa programmer kunci pintu? Ada "keys"! 😄','AI dan kopi: butuh training! ☕']);
        if (t==='time') return '🕐 '+new Date().toLocaleString('id-ID',{hour:'2-digit',minute:'2-digit',day:'numeric',month:'long',year:'numeric'});
        if (t==='about') return `🧠 Yad AI v8.5 | Token: ✅ | Deploy: ${S.deployCount}x | By YADI ganteng`;
        if (t==='clear') { $('chatMessages').innerHTML=''; return null; }
        return null;
    }

    // ================================================================
    // MAIN SEND
    // ================================================================
    async function sendMsg() {
        if (S.processing) return;
        const input = $('userInput'), text = input.value.trim();
        if (!text) return;
        
        S.processing = true; input.value = ''; S.chats++; S.score++;
        addMsg('user', escHTML(text));
        
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message ai';
        typingDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
        $('chatMessages').appendChild(typingDiv);
        
        try {
            const cmdResult = await handleCommand(text);
            typingDiv.remove();
            if (cmdResult) {
                addMsg('ai', cmdResult);
            } else {
                const aiResult = await callAIAPI(text);
                addMsg('ai', aiResult || getAIResponse(text));
            }
        } catch(e) {
            typingDiv.remove();
            addMsg('ai', '❌ Error: ' + e.message);
        } finally {
            S.processing = false;
        }
    }

    // ================================================================
    // AUTH
    // ================================================================
    function showLogin() {
        const e=prompt('Email:'); if(!e)return;
        const p=prompt('Password:'); if(!p)return;
        if(!auth){toast('❌ Firebase error','error');return;}
        auth.signInWithEmailAndPassword(e,p).then(()=>toast('✅ Login!','success')).catch(err=>{if(err.code==='auth/user-not-found'&&confirm('Buat?')){auth.createUserWithEmailAndPassword(e,p).then(()=>toast('✅ Created!','success')).catch(er=>toast('❌ '+er.message,'error'));}else toast('❌ '+err.message,'error');});
    }
    async function doLogout() { if(auth){await auth.signOut();toast('👋 Logout!','info');} }
    
    if(auth){auth.onAuthStateChanged(u=>{const s=$('auth-status'),li=$('login-btn'),lo=$('logout-btn');if(u){S.user=u;S.isAdmin=u.email===CFG.adminEmail;S.role=S.isAdmin?'admin':'user';s.className='badge '+S.role;s.textContent=S.isAdmin?'👑 Admin':'👤 User';li.style.display='none';lo.style.display='inline-block';}else{S.isAdmin=false;S.role='guest';s.className='badge guest';s.textContent='🔓 Guest';li.style.display='inline-block';lo.style.display='none';}});}

    // ================================================================
    // EVENT LISTENERS
    // ================================================================
    $('sendBtn').addEventListener('click',e=>{e.preventDefault();sendMsg();});
    $('sendBtn').addEventListener('touchend',e=>{e.preventDefault();sendMsg();});
    $('userInput').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();sendMsg();}});
    document.getElementById('fileInput').addEventListener('change',function(e){const f=e.target.files;if(!f.length)return;addMsg('ai',`✅ ${f.length} file diterima.`);this.value='';});

    // ================================================================
    // CONSOLE API
    // ================================================================
    window.yad = {
        deploy: async () => { const r = await deployToGithub(); console.log(r.replace(/<[^>]+>/g,'')); return r; },
        deployFB: async () => { const r = await deployToFirestore(); console.log(r.replace(/<[^>]+>/g,'')); return r; },
        token: async () => { const r = await testToken(); console.log(r.replace(/<[^>]+>/g,'')); return r; },
        search: async (q) => { const r = await searchDDG(q); console.table(r); return r; },
        ai: async (p) => { const r = await callAIAPI(p); console.log(r); return r; },
        help: () => console.log('yad.deploy() | yad.deployFB() | yad.token() | yad.search("q") | yad.ai("p")')
    };

    // ================================================================
    // INIT
    // ================================================================
    document.body.style.height = window.innerHeight + 'px';
    
    addMsg('ai', `<b>🧠 Yad AI v8.5 - TOKEN FIX!</b><br><br>
        ✅ <b>Token GitHub:</b> ${GITHUB_TOKEN.substring(0,10)}...${GITHUB_TOKEN.substring(GITHUB_TOKEN.length-5)}<br>
        ✅ <b>Verified:</b> User YADI-ganteng<br><br>
        <b>Coba:</b><br>
        • <code>deploy</code> - Deploy GitHub<br>
        • <code>deploy firebase</code> - Deploy Firestore<br>
        • <code>token</code> - Test token<br>
        • <code>cari [topik]</code> - Search + AI<br>
        • <code>?</code> - Help`);
    
    console.log('🚀 Yad AI v8.5 - Token: ✅ | Deploy: Ready');
    console.log('💡 yad.deploy() di console untuk deploy langsung');
})();
</script>
