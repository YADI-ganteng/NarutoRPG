<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Naruto RPG</title><style>*{margin:0;padding:0}body{background:#0a0a1a;color:white;font-family:Arial;text-align:center;padding:20px}h1{color:#ff6b35}button{background:#ff6b35;color:white;border:none;padding:15px 30px;font-size:1.2em;border-radius:30px;margin:8px}.bar{width:200px;height:20px;background:#333;border-radius:10px;margin:10px auto}.fill{height:100%;background:#4CAF50;width:100%}</style></head><body><h1>NARUTO RPG</h1><p>HP: <b id="hp">500</b></p><div class="bar"><div class="fill" id="bar"></div></div><button onclick="atk(50)">ATTACK</button><button onclick="atk(100)">SKILL</button><button onclick="atk(200)">ULTIMATE</button><button onclick="hp=500;update()">RESET</button><script>var hp=500;function atk(d){hp-=d;if(hp<0)hp=0;update()}function update(){document.getElementById("hp").textContent=hp;document.getElementById("bar").style.width=(hp/500*100)+"%"}</script></body></html>
