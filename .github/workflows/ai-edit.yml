name: AI Self-Edit

on:
  repository_dispatch:
    types: [ai-edit]

jobs:
  edit-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Apply AI Edit
        run: |
          echo "Instruction: ${{ github.event.client_payload.instruction }}"
          
          # Download file
          curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/vnd.github.v3+json" \
               "https://api.github.com/repos/${{ github.repository }}/contents/index.html?ref=main" \
               -o file.json
          
          # Extract content
          cat file.json | jq -r '.content' | base64 -d > index.html
          
          # Apply edit based on instruction
          INSTRUCTION="${{ github.event.client_payload.instruction }}"
          
          if echo "$INSTRUCTION" | grep -qi "tambah fitur"; then
            FEATURE=$(echo "$INSTRUCTION" | sed 's/tambah fitur//gi' | xargs)
            sed -i "s|</body>|<div style=\"padding:20px;text-align:center;\"><h3>$FEATURE</h3><p>Added by AI</p></div>\n</body>|" index.html
          fi
          
          if echo "$INSTRUCTION" | grep -qi "rename ai\|ubah nama"; then
            NEWNAME=$(echo "$INSTRUCTION" | sed 's/rename ai\|ubah nama\|menjadi\|ke//gi' | xargs)
            sed -i "s|<title>.*</title>|<title>$NEWNAME - AI</title>|" index.html
            sed -i "s|Yad AI|$NEWNAME|g" index.html
          fi
      
      - name: Commit changes
        run: |
          git config user.name "Yad AI"
          git config user.email "ai@yadstores.web.app"
          git add index.html
          git diff --quiet || git commit -m "AI Edit: ${{ github.event.client_payload.instruction }}"
          git push
      
      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: yadstores
