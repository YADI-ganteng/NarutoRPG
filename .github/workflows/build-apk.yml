name: Build APK

on: workflow_dispatch

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/rpg/naruto
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets

      - name: Copy Game Assets
        run: |
          cp -r characters app/src/main/assets/ 2>/dev/null || true
          cp -r sounds app/src/main/assets/ 2>/dev/null || true
          cp -r effects app/src/main/assets/ 2>/dev/null || true
          cp -r maps app/src/main/assets/ 2>/dev/null || true
          cp -r ui app/src/main/assets/ 2>/dev/null || true
          cp -r sprites_extracted app/src/main/assets/ 2>/dev/null || true
          cp characters.json app/src/main/assets/ 2>/dev/null || true
          echo "=== Assets in app/src/main/assets ==="
          ls -la app/src/main/assets/
          echo "=== Subdirectories ==="
          find app/src/main/assets/ -type d 2>/dev/null | head -20

      - name: Create Game HTML
        run: |
          cat > app/src/main/assets/index.html << 'HTMLEOF'
          <!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=800,user-scalable=no"><title>Naruto RPG</title>
          <style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;font-family:monospace}#screen{position:relative;width:800px;height:480px;background:#0a0a2e;overflow:hidden}canvas{position:absolute;top:0;left:0}#bar{position:absolute;bottom:0;left:0;width:100%;background:rgba(0,0,0,0.85);padding:6px 10px;display:flex;justify-content:space-between;align-items:center;z-index:10;color:white;font-size:11px}.hp-wrap{width:160px;height:10px;background:#333;border-radius:3px;overflow:hidden}.hp-fill{width:100%;height:100%;background:#ff4444;transition:0.3s}.cp-wrap{width:160px;height:7px;background:#1a1a4a;border-radius:3px;overflow:hidden;margin-top:2px}.cp-fill{width:100%;height:100%;background:#4488ff;transition:0.3s}.btn{background:#ff6b35;color:white;border:none;padding:6px 12px;border-radius:5px;font-size:11px;cursor:pointer;margin-left:4px}.btn:active{transform:scale(0.9);opacity:0.8}#atk{position:absolute;bottom:90px;right:20px;width:60px;height:60px;border-radius:50%;background:rgba(255,80,30,0.8);border:3px solid #f60;color:white;font-weight:bold;font-size:11px;z-index:10}#atk:active{background:#f60}#msg{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);color:white;padding:5px 14px;border-radius:14px;font-size:13px;z-index:15;display:none}#panel{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.93);z-index:20;display:none;overflow-y:auto;padding:15px}#panel h2{color:#ff6b35;text-align:center;margin-bottom:10px;font-size:18px}.grid{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}.card{width:80px;height:90px;background:#1a1a3a;border:2px solid #333;border-radius:6px;cursor:pointer;text-align:center;padding:3px;color:white;font-size:9px}.card:hover,.card.sel{border-color:#ff6b35;background:#2a2a4a}.card div{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}</style></head>
          <body><div id="screen"><canvas id="gc" width="800" height="480"></canvas><div id="msg"></div><div id="atk" onclick="atk()">⚔️<br>ATK</div><div id="bar"><div><div>❤️ <span id="pn">Naruto</span> | <span id="php">100</span></div><div class="hp-wrap"><div class="hp-fill" id="hpf"></div></div><div class="cp-wrap"><div class="cp-fill" id="cpf"></div></div></div><div style="text-align:right"><div style="color:#f88">👤 <span id="en">-</span> | ❤️ <span id="ehp">0</span></div><button class="btn" onclick="tgl()">👥 Pilih</button><button class="btn" onclick="sp()">⚔️ Lawan</button></div></div><div id="panel"><h2>🔥 PILIH KARAKTER</h2><div class="grid" id="grid"></div><button class="btn" onclick="tgl()" style="display:block;margin:14px auto;padding:8px 24px;background:#f44;font-size:14px">TUTUP ✖</button></div></div>
          <script>
          const cv=document.getElementById('gc'),ctx=cv.getContext('2d');
          let chars=[],pl={n:'Naruto',hp:100,mhp:100,cp:100,mcp:100,atk:25,x:350,y:300,d:0,f:0,t:0,at:0},en=null,keys={},mi=null,pt=[];
          async function init(){try{let r=await fetch('characters.json');let d=await r.json();chars=Array.isArray(d)?d:[]}catch(e){chars=gc()};bg();lm('1.nsx');ui();lp()}
          function gc(){let n='Naruto,Sasuke,Sakura,Kakashi,Itachi,Jiraiya,Tsunade,Orochimaru,Gaara,Lee,Neji,Hinata,Shikamaru,Choji,Ino,Kiba,Shino,Tenten,Minato,Madara,Pain,Konan,Kisame,Deidara,Hidan,Kakuzu,Yamato,Sai,Suigetsu,Jugo,Karin,Nagato,Asuma,Gai,Iruka,Rin,Obito'.split(',');return n.map((nm,i)=>({name:nm,id:i,hp:80+Math.floor(Math.random()*70),cp:50+Math.floor(Math.random()*100),atk:10+Math.floor(Math.random()*30)}))}
          function bg(){document.getElementById('grid').innerHTML=chars.slice(0,36).map((c,i)=>'<div class="card" onclick="sc('+i+')" id="c'+i+'"><div>'+c.name+'</div><div style="color:#f63;font-size:8px">❤'+c.hp+'</div></div>').join('')}
          function sc(i){let c=chars[i];if(!c)return;pl.n=c.name;pl.hp=c.hp||100;pl.mhp=c.hp||100;pl.cp=c.cp||100;pl.mcp=c.cp||100;pl.atk=c.atk||25;document.querySelectorAll('.card').forEach(e=>e.classList.remove('sel'));document.getElementById('c'+i)?.classList.add('sel');ms('✅ '+pl.n+' dipilih!');setTimeout(tgl,600);ui()}
          function tgl(){let p=document.getElementById('panel');p.style.display=p.style.display=='block'?'none':'block'}
          function ms(t){let b=document.getElementById('msg');b.textContent=t;b.style.display='block';clearTimeout(b._t);b._t=setTimeout(()=>b.style.display='none',2000)}
          function ui(){document.getElementById('pn').textContent=pl.n;document.getElementById('php').textContent=Math.floor(pl.hp);document.getElementById('hpf').style.width=(pl.hp/pl.mhp*100)+'%';document.getElementById('cpf').style.width=(pl.cp/pl.mcp*100)+'%';document.getElementById('en').textContent=en?en.n:'-';document.getElementById('ehp').textContent=en?Math.floor(en.hp):'0'}
          function lm(n){let i=new Image();i.onload=()=>{mi=i};i.onerror=()=>{mi=null};i.src='maps/'+n}
          function sp(){if(en)return ms('⚔️ Lawan masih hidup!');let p=chars.length>0?chars:gc();let t=p[Math.floor(Math.random()*p.length)];en={n:t.name,hp:(t.hp||80)+20,mhp:(t.hp||80)+20,x:500+Math.random()*200,y:200+Math.random()*100,f:0,t:0};ms('⚔️ '+en.n+' muncul!');ui()}
          function atk(){if(!en)return ms('⚠️ Tidak ada musuh!');let dmg=Math.floor(pl.atk*(0.8+Math.random()*0.4));en.hp-=dmg;pl.at=10;for(let i=0;i<10;i++)pt.push({x:en.x,y:en.y,vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*6-2,l:16,c:'#f63',s:3+Math.random()*4});ms('👊 '+dmg+' damage!');if(en.hp<=0){ms('💀 '+en.n+' dikalahkan!');en=null};ui()}
          document.addEventListener('keydown',e=>keys[e.key]=true);document.addEventListener('keyup',e=>keys[e.key]=false);
          let ts=null;cv.addEventListener('touchstart',e=>{e.preventDefault();ts={x:e.touches[0].clientX,y:e.touches[0].clientY}});
          cv.addEventListener('touchmove',e=>{e.preventDefault();if(!ts)return;let dx=e.touches[0].clientX-ts.x,dy=e.touches[0].clientY-ts.y;keys['ArrowRight']=dx>15;keys['ArrowLeft']=dx<-15;keys['ArrowDown']=dy>15;keys['ArrowUp']=dy<-15});
          cv.addEventListener('touchend',e=>{e.preventDefault();keys['ArrowRight']=keys['ArrowLeft']=keys['ArrowUp']=keys['ArrowDown']=false;ts=null});
          function lp(){
              if(keys['ArrowRight']||keys['d']){pl.x+=3;pl.d=1;pl.t++}else if(keys['ArrowLeft']||keys['a']){pl.x-=3;pl.d=2;pl.t++}else if(keys['ArrowDown']||keys['s']){pl.y+=3;pl.d=0;pl.t++}else if(keys['ArrowUp']||keys['w']){pl.y-=3;pl.d=3;pl.t++}else pl.f=0;
              if(pl.t>6){pl.t=0;pl.f=(pl.f+1)%4};pl.x=Math.max(20,Math.min(780,pl.x));pl.y=Math.max(40,Math.min(440,pl.y));if(pl.at>0)pl.at--;
              if(pl.cp<pl.mcp)pl.cp+=0.05;
              if(en){let dx=pl.x-en.x,dy=pl.y-en.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist>50){en.x+=dx/dist*1.3;en.y+=dy/dist*1.3}else if(Math.random()<0.015){pl.hp-=2;ms('💢 '+en.n+' menyerang!')};en.t++;if(en.t>8){en.t=0;en.f=(en.f+1)%4};if(pl.hp<=0){ms('💀 Game Over!');pl.hp=pl.mhp;en=null}}
              pt=pt.filter(p=>{p.l--;return p.l>0});pt.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.2});ui();
              ctx.clearRect(0,0,800,480);
              if(mi)ctx.drawImage(mi,0,0,800,480);else{let g=ctx.createLinearGradient(0,0,0,480);g.addColorStop(0,'#1a1a3a');g.addColorStop(1,'#2a1a0a');ctx.fillStyle=g;ctx.fillRect(0,0,800,480)}
              dw(pl,true);if(en)dw(en,false);
              pt.forEach(p=>{ctx.fillStyle=p.c;ctx.globalAlpha=p.l/16;ctx.fillRect(p.x-2,p.y-2,p.s,p.s);ctx.globalAlpha=1});
              requestAnimationFrame(lp)
          }
          function dw(c,ip){
              ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.ellipse(c.x,c.y+24,14,4,0,0,Math.PI*2);ctx.fill();
              ctx.fillStyle=ip?'#f63':'#f44';ctx.fillRect(c.x-12,c.y-18,24,32);
              ctx.fillStyle=ip?'#fa5':'#f86';ctx.beginPath();ctx.arc(c.x,c.y-22,10,0,Math.PI*2);ctx.fill();
              ctx.fillStyle='white';ctx.fillRect(c.x-3,c.y-26,2,2);ctx.fillRect(c.x+1,c.y-26,2,2);ctx.fillStyle='#111';ctx.fillRect(c.x-2,c.y-25,1.5,1.5);ctx.fillRect(c.x+2,c.y-25,1.5,1.5);
              ctx.fillStyle='white';ctx.font='8px monospace';ctx.textAlign='center';ctx.fillText(c.n,c.x,c.y-32);
              ctx.fillStyle='#333';ctx.fillRect(c.x-14,c.y-36,28,3);ctx.fillStyle=ip?'#4f4':'#f44';ctx.fillRect(c.x-14,c.y-36,28*(c.hp/c.mhp),3);
              if(ip&&pl.at>0){ctx.strokeStyle='#ff0';ctx.lineWidth=2;ctx.beginPath();ctx.arc(c.x+16,c.y-6,12,0,Math.PI*2);ctx.stroke()}
          }
          setInterval(()=>{let m=['1.nsx','2.nsx','3.nsx','4.nsx','5.nsx','100.nsx'];lm(m[Math.floor(Math.random()*m.length)])},25000);
          init();
          </script></body></html>
          HTMLEOF
          echo "✅ Game HTML created ($(wc -c < app/src/main/assets/index.html) bytes)"

      - name: Create settings.gradle
        run: |
          cat > settings.gradle << 'EOF'
          rootProject.name = "NarutoRPG"
          include ":app"
          EOF

      - name: Create root build.gradle (tanpa plugins block)
        run: |
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath "com.android.tools.build:gradle:7.4.2"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

      - name: Create app/build.gradle (apply plugin format)
        run: |
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          
          android {
              namespace 'com.rpg.naruto'
              compileSdkVersion 33
              
              defaultConfig {
                  applicationId "com.rpg.naruto"
                  minSdkVersion 21
                  targetSdkVersion 33
                  versionCode 1
                  versionName "1.0"
              }
              
              buildTypes {
                  debug {
                      debuggable true
                  }
                  release {
                      minifyEnabled false
                  }
              }
          }
          EOF

      - name: Create gradle.properties
        run: |
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

      - name: Create AndroidManifest.xml
        run: |
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application 
                  android:label="Naruto RPG"
                  android:theme="@android:style/Theme.Black.NoTitleBar.Fullscreen"
                  android:hardwareAccelerated="true">
                  <activity 
                      android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="landscape"
                      android:configChanges="orientation|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

      - name: Create strings.xml
        run: |
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Naruto RPG</string>
          </resources>
          EOF

      - name: Create MainActivity.java
        run: |
          cat > app/src/main/java/com/rpg/naruto/MainActivity.java << 'EOF'
          package com.rpg.naruto;
          
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebSettings;
          import android.webkit.WebViewClient;
          import android.view.Window;
          import android.view.WindowManager;
          import android.view.View;
          
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(
                      WindowManager.LayoutParams.FLAG_FULLSCREEN,
                      WindowManager.LayoutParams.FLAG_FULLSCREEN
                  );
                  
                  WebView webView = new WebView(this);
                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setDomStorageEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);
                  settings.setUseWideViewPort(true);
                  settings.setLoadWithOverviewMode(true);
                  settings.setMediaPlaybackRequiresUserGesture(false);
                  
                  webView.setWebViewClient(new WebViewClient());
                  webView.setSystemUiVisibility(
                      View.SYSTEM_UI_FLAG_FULLSCREEN |
                      View.SYSTEM_UI_FLAG_HIDE_NAVIGATION |
                      View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
                  );
                  
                  webView.loadUrl("file:///android_asset/index.html");
                  setContentView(webView);
              }
          }
          EOF

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-33 build-tools;33.0.0'

      - name: Remove system Gradle & Install Gradle 7.6
        run: |
          echo "=== System Gradle ==="
          which gradle 2>/dev/null && gradle --version 2>/dev/null || echo "No system gradle"
          
          # Hapus gradle bawaan kalau ada
          sudo rm -rf /usr/local/lib/gradle 2>/dev/null || true
          sudo rm -f /usr/local/bin/gradle 2>/dev/null || true
          sudo rm -f /usr/bin/gradle 2>/dev/null || true
          
          # Download Gradle 7.6
          echo "Downloading Gradle 7.6..."
          wget -q https://services.gradle.org/distributions/gradle-7.6-bin.zip
          unzip -q gradle-7.6-bin.zip
          export GRADLE_HOME=$PWD/gradle-7.6
          export PATH=$GRADLE_HOME/bin:$PATH
          
          echo "=== Installed Gradle ==="
          gradle --version
          
          # Generate wrapper dengan Gradle 7.6
          gradle wrapper --gradle-version 7.6
          echo "=== Wrapper generated ==="
          cat gradle/wrapper/gradle-wrapper.properties

      - name: Build APK
        run: |
          export GRADLE_HOME=$PWD/gradle-7.6
          export PATH=$GRADLE_HOME/bin:$PATH
          chmod +x gradlew
          echo "=== Building with Gradle wrapper ==="
          ./gradlew assembleDebug --no-daemon --stacktrace --warning-mode all 2>&1 | tail -40
          echo "=== Looking for APK ==="
          find . -name "*.apk" -type f -ls 2>/dev/null || echo "No APK found!"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NarutoRPG-APK
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
