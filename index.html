<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Yad AI - Super Intelligent v8.0</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <style>
        :root{--bg-primary:#0a0e17;--bg-secondary:#141c2b;--bg-tertiary:#1e2a3a;--text-primary:#e8edf5;--text-secondary:#8899aa;--accent-blue:#4a90d9;--accent-purple:#7c5ce7;--accent-green:#2ecc71;--accent-red:#e74c3c;--accent-gold:#f39c12;--accent-cyan:#00bcd4;--accent-pink:#e91e63;--border-color:#2a3545;--radius-sm:8px;--radius-md:12px;--radius-lg:16px;--safe-bottom:env(safe-area-inset-bottom,0px);--transition:all 0.3s ease}
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg-primary);color:var(--text-primary);height:100vh;height:100dvh;width:100vw;overflow:hidden;position:fixed;top:0;left:0}
        #app{height:100%;display:flex;flex-direction:column}
        .header{background:linear-gradient(135deg,#0f1729,#1a2332);padding:10px 16px;border-bottom:1px solid var(--border-color);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;z-index:20;min-height:50px}
        .header-left{display:flex;align-items:center;gap:10px}
        .ai-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple));display:flex;align-items:center;justify-content:center;font-size:16px;animation:glow 2s infinite}
        @keyframes glow{0%,100%{box-shadow:0 0 5px rgba(74,144,217,0.5)}50%{box-shadow:0 0 20px rgba(124,92,231,0.8)}}
        .header-title{font-size:14px;font-weight:700}
        .header-title span{background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .header-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
        .badge{padding:4px 8px;border-radius:12px;font-size:9px;font-weight:600;border:1px solid}
        .badge.admin{background:rgba(124,92,231,0.15);border-color:var(--accent-purple);color:var(--accent-purple)}
        .badge.user{background:rgba(46,204,113,0.15);border-color:var(--accent-green);color:var(--accent-green)}
        .badge.guest{background:rgba(136,153,170,0.15);border-color:var(--text-secondary);color:var(--text-secondary)}
        .btn-icon{padding:5px 10px;border-radius:12px;border:1px solid var(--border-color);background:transparent;color:var(--text-primary);cursor:pointer;font-size:9px}
        .chat-area{flex:1;display:flex;flex-direction:column;background:var(--bg-primary);min-height:0}
        .chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
        .message{max-width:85%;animation:slideUp 0.3s ease;line-height:1.5;word-wrap:break-word}
        @keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .message.user{margin-left:auto;background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple));color:white;padding:10px 14px;border-radius:16px 16px 4px 16px;font-size:13px}
        .message.ai{margin-right:auto;background:var(--bg-secondary);border:1px solid var(--border-color);padding:10px 14px;border-radius:16px 16px 16px 4px;font-size:13px}
        .message .card{background:var(--bg-tertiary);padding:8px;border-radius:8px;margin:6px 0;border:1px solid var(--border-color);font-size:11px}
        .input-area{padding:8px 12px;padding-bottom:calc(8px + var(--safe-bottom));background:var(--bg-secondary);border-top:1px solid var(--border-color);display:flex;gap:8px;align-items:center}
        .input-area input{flex:1;padding:12px 14px;background:var(--bg-primary);border:2px solid var(--border-color);border-radius:24px;color:var(--text-primary);font-size:14px;outline:none}
        .input-area input:focus{border-color:var(--accent-blue);box-shadow:0 0 0 3px rgba(74,144,217,0.15)}
        .send-btn{width:44px;height:44px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple));color:white;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
        .send-btn:active{transform:scale(0.9)}
        .attach-btn{width:38px;height:38px;border-radius:50%;border:2px solid var(--border-color);background:transparent;color:var(--text-secondary);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
        .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:20px;color:white;font-size:12px;z-index:100;animation:toastIn 0.3s ease;font-weight:600}
        @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
        .toast.success{background:var(--accent-green)}.toast.error{background:var(--accent-red)}.toast.info{background:var(--accent-blue)}
        .progress-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);display:none;align-items:center;justify-content:center;z-index:50}
        .progress-overlay.active{display:flex}
        .progress-card{background:var(--bg-secondary);padding:24px;border-radius:16px;text-align:center;width:300px}
        .progress-bar{width:100%;height:4px;background:var(--bg-tertiary);border-radius:2px;margin:10px 0;overflow:hidden}
        .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent-blue),var(--accent-purple));width:0%;transition:width 0.5s}
        @media(min-width:768px){.message{max-width:70%}}
        @media(max-width:767px){.message{max-width:90%;font-size:13px}.send-btn{width:40px;height:40px}}
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <div class="header-left"><div class="ai-avatar">&#x1F9E0;</div><div class="header-title"><span>Yad AI</span></div></div>
            <div class="header-right">
                <span id="ai-badge" class="badge" style="background:rgba(46,204,113,0.15);border-color:var(--accent-green);color:var(--accent-green);font-size:8px;">DeepSeek</span>
                <span id="auth-status" class="badge guest">Guest</span>
                <button id="login-btn" class="btn-icon" onclick="showLogin()">Login</button>
                <button id="logout-btn" class="btn-icon" style="display:none;" onclick="doLogout()">Logout</button>
            </div>
        </div>
        <div class="chat-area">
            <div class="chat-messages" id="chatMessages">
                <div class="message ai">
                    <b>Yad AI - Super Intelligent v8.0</b><br><br>
                    AI dengan pengetahuan coding, logika, perbandingan, analisis, dan penyusunan.<br><br>
                    Pengetahuan berasal dari Firebase Firestore (unlimited).<br><br>
                    Ketik <code>?</code> untuk bantuan.
                </div>
            </div>
            <div class="input-area">
                <button class="attach-btn" onclick="document.getElementById('fileInput').click()">+</button>
                <input type="text" id="userInput" placeholder="Ketik pesan..." autocomplete="off" enterkeyhint="send">
                <button class="send-btn" id="sendBtn">&#10148;</button>
            </div>
        </div>
    </div>
    <input type="file" id="fileInput" accept="*/*" multiple style="display:none;">
    <div id="toastContainer"></div>
    <div class="progress-overlay" id="progOverlay"><div class="progress-card"><div style="font-size:32px;">&#x23F3;</div><div style="margin:8px 0;font-weight:700;" id="progTitle">Processing...</div><div class="progress-bar"><div class="progress-fill" id="progFill"></div></div><div style="font-size:11px;color:var(--text-secondary);" id="progDetail"></div></div></div>

<script>
(function(){
// ============================================================
// KONFIGURASI FIREBASE
// ============================================================
const FIREBASE_CONFIG = {
    apiKey: "AIzaSyAvfHxcAT2syVbrf6-TU0JBRXtNLI0AIkc",
    authDomain: "yadstores.firebaseapp.com",
    projectId: "yadstores",
    storageBucket: "yadstores.firebasestorage.app",
    messagingSenderId: "666352014774",
    appId: "1:666352014774:web:159ab5b455efb2fb2f9d17",
    measurementId: "G-8Q7T7G6HQ2",
    databaseURL: "https://yadstores-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const ADMIN_EMAIL = 'ynuraini686@gmail.com';
const GITHUB_TOKEN = localStorage.getItem('gh_token') || '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';

// ============================================================
// INISIALISASI FIREBASE
// ============================================================
firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const fs = firebase.firestore();

// ============================================================
// STATE GLOBAL
// ============================================================
const S = { isAdmin: false, user: null, role: 'guest', processing: false };

// ============================================================
// AI PROVIDERS
// ============================================================
const AI_PROVIDERS = [
    { name: "DeepSeek", apiKey: "sk-9f4577079ddb4bd7a6dfebdb1161889c", url: "https://api.deepseek.com/v1/chat/completions", model: "deepseek-chat" },
    { name: "Groq", apiKey: "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", url: "https://api.groq.com/openai/v1/chat/completions", model: "llama3-70b-8192" }
];

const callAI = async (messages) => {
    const p = AI_PROVIDERS[0];
    try {
        const r = await fetch(p.url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + p.apiKey },
            body: JSON.stringify({ model: p.model, messages: messages.slice(-20), max_tokens: 2000, temperature: 0.7 })
        });
        if (!r.ok) return null;
        const d = await r.json();
        return d.choices?.[0]?.message?.content || null;
    } catch (e) { return null; }
};

// ============================================================
// FIRESTORE KNOWLEDGE BASE (UNLIMITED)
// ============================================================

// Simpan pengetahuan
const saveKnowledge = async (query, answer, type = 'general') => {
    try {
        await fs.collection('knowledge_base').add({
            query: query,
            answer: answer,
            type: type,
            timestamp: new Date().toISOString()
        });
    } catch (e) { console.error('Gagal simpan:', e); }
};

// Ambil pengetahuan terkait
const getKnowledge = async (query, limit = 10) => {
    try {
        const snapshot = await fs.collection('knowledge_base')
            .orderBy('timestamp', 'desc')
            .limit(limit)
            .get();
        const results = [];
        snapshot.forEach(doc => results.push(doc.data()));
        return results;
    } catch (e) { return []; }
};

// ============================================================
// INTELLIGENT AGENT LOOP
// ============================================================
const agentLoop = async (userQuery) => {
    showProg('AI sedang berpikir...', userQuery);
    
    // 1. Ambil pengetahuan terkait dari Firestore
    const related = await getKnowledge(userQuery);
    
    // 2. Susun konteks
    let context = `Pertanyaan: ${userQuery}\n\n`;
    if (related.length > 0) {
        context += `Pengetahuan yang sudah ada (dari database):\n`;
        related.forEach((r, i) => {
            context += `- [${i+1}] ${r.answer ? r.answer.substring(0, 200) : '(kosong)'}...\n`;
        });
    }
    
    // 3. Minta AI untuk menganalisis, membandingkan, menyusun, dan menjawab
    const systemPrompt = `Anda adalah Yad AI, super intelligent assistant. 
    Tugas Anda: Analisis, bandingkan, susun, dan berikan jawaban terbaik untuk pertanyaan user.
    Gunakan semua pengetahuan yang ada di konteks. Jika ada yang kurang, gunakan logika Anda sendiri.
    Jawab dalam bahasa Indonesia dengan jelas, terstruktur, dan profesional.`;
    
    const aiResponse = await callAI([
        { role: 'system', content: systemPrompt },
        { role: 'user', content: context + '\n\nBerikan jawaban yang lengkap, akurat, dan bermanfaat.' }
    ]);
    
    // 4. Simpan jawaban ke database (agar AI semakin pintar)
    if (aiResponse && aiResponse.length > 50) {
        await saveKnowledge(userQuery, aiResponse, 'ai_generated');
    }
    
    hideProg();
    return aiResponse || 'Maaf, saya belum bisa menjawab pertanyaan ini.';
};

// ============================================================
// MAIN SEND MESSAGE
// ============================================================
const sendMsg = async () => {
    if (S.processing) return;
    const input = $('userInput');
    const text = input.value.trim();
    if (!text) return;
    
    S.processing = true;
    input.value = '';
    addMsg('user', escHTML(text));
    const typingDiv = addMsg('ai', 'Berpikir...');
    
    try {
        const t = text.toLowerCase();
        let resp = '';
        
        // Handle special commands
        if (t === '?' || t === 'help') {
            resp = `🧠 <b>Yad AI - Super Intelligent v8.0</b><br><br>
                    AI ini memiliki pengetahuan dari Firestore (unlimited) tentang:<br>
                    • Coding (Python, JS, HTML, CSS)<br>
                    • Logika & Algoritma<br>
                    • Perbandingan teknologi<br>
                    • Penyusunan kode & dokumentasi<br>
                    • Analisis & troubleshooting<br><br>
                    <b>Perintah:</b><br>
                    • <code>cari [query]</code> - Analisis mendalam dari database<br>
                    • <code>analisis [teks/kode]</code> - Analisis mendalam<br>
                    • <code>bandingkan [A] vs [B]</code> - Perbandingan<br>
                    • <code>buat kode [instruksi]</code> - Generate kode<br>
                    • <code>troubleshoot [error]</code> - Debugging<br>
                    • <code>py [kode]</code> - Jalankan Python via Vercel<br>
                    <br><i>Semua pengetahuan disimpan di Firestore (unlimited).</i>`;
        } else if (t.startsWith('cari ')) {
            resp = await agentLoop(t);
        } else if (t.startsWith('analisis ') || t.startsWith('bandingkan ') || t.startsWith('buat kode ') || t.startsWith('troubleshoot ')) {
            resp = await agentLoop(t);
        } else {
            resp = await agentLoop(text);
        }
        
        typingDiv.remove();
        addMsg('ai', resp);
    } catch (e) {
        typingDiv.remove();
        addMsg('ai', 'Error: ' + e.message);
        hideProg();
    } finally {
        S.processing = false;
    }
};

// ============================================================
// UTILITY FUNCTIONS
// ============================================================
const $ = id => document.getElementById(id);
const toast = (m, t) => {
    const c = $('toastContainer');
    const ex = c.querySelector('.toast');
    if (ex) ex.remove();
    const d = document.createElement('div');
    d.className = 'toast ' + (t || 'info');
    d.textContent = m;
    c.appendChild(d);
    setTimeout(() => { d.style.opacity = '0'; d.style.transition = 'opacity 0.3s'; setTimeout(() => d.remove(), 300); }, 2500);
};
const addMsg = (type, content) => {
    const c = $('chatMessages');
    const d = document.createElement('div');
    d.className = 'message ' + type;
    d.innerHTML = content;
    c.appendChild(d);
    setTimeout(() => c.scrollTo({ top: c.scrollHeight, behavior: 'smooth' }), 100);
    return d;
};
const showProg = (title, detail) => {
    $('progOverlay').classList.add('active');
    $('progTitle').textContent = title;
    $('progDetail').textContent = detail || '';
    $('progFill').style.width = '0%';
};
const hideProg = () => {
    $('progFill').style.width = '100%';
    setTimeout(() => $('progOverlay').classList.remove('active'), 500);
};
const escHTML = t => { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; };

// ============================================================
// EVENT LISTENERS
// ============================================================
$('sendBtn').addEventListener('click', (e) => { e.preventDefault(); sendMsg(); });
$('sendBtn').addEventListener('touchend', (e) => { e.preventDefault(); sendMsg(); });
$('userInput').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } });

// ============================================================
// AUTHENTICATION
// ============================================================
const showLogin = () => {
    const e = prompt('Email:');
    if (!e) return;
    const p = prompt('Password:');
    if (!p) return;
    auth.signInWithEmailAndPassword(e, p)
        .then(() => toast('Login berhasil!', 'success'))
        .catch(err => {
            if (err.code === 'auth/user-not-found' && confirm('Buat akun?')) {
                auth.createUserWithEmailAndPassword(e, p)
                    .then(() => toast('Akun dibuat!', 'success'))
                    .catch(er => toast('Error: ' + er.message, 'error'));
            } else {
                toast('Error: ' + err.message, 'error');
            }
        });
};
const doLogout = async () => {
    await auth.signOut();
    toast('Logout!', 'info');
};
auth.onAuthStateChanged(u => {
    const s = $('auth-status'), li = $('login-btn'), lo = $('logout-btn');
    if (u) {
        S.user = u;
        S.isAdmin = u.email === ADMIN_EMAIL;
        S.role = S.isAdmin ? 'admin' : 'user';
        s.className = 'badge ' + S.role;
        s.textContent = S.isAdmin ? 'Admin' : 'User';
        li.style.display = 'none';
        lo.style.display = 'inline-block';
    } else {
        S.isAdmin = false;
        S.role = 'guest';
        s.className = 'badge guest';
        s.textContent = 'Guest';
        li.style.display = 'inline-block';
        lo.style.display = 'none';
    }
});

// ============================================================
// INIT
// ============================================================
console.log('Yad AI Super Intelligent v8.0 Ready!');
})();
</script>
</body>
</html>
