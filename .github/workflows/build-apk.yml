name: Build APK

on: workflow_dispatch

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Project
        run: |
          mkdir -p app/src/main/java/com/rpg/naruto
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/assets
          
          # Copy all game files to assets
          cp -r characters app/src/main/assets/ 2>/dev/null || true
          cp -r sounds app/src/main/assets/ 2>/dev/null || true
          cp -r effects app/src/main/assets/ 2>/dev/null || true
          cp -r maps app/src/main/assets/ 2>/dev/null || true
          cp -r ui app/src/main/assets/ 2>/dev/null || true
          cp -r sprites_extracted app/src/main/assets/ 2>/dev/null || true
          cp characters.json app/src/main/assets/ 2>/dev/null || true
          
          echo "Files copied!"
          ls -la app/src/main/assets/
      
      - name: Create Build Files
        run: |
          # settings.gradle
          echo 'rootProject.name = "NarutoRPG"' > settings.gradle
          echo 'include ":app"' >> settings.gradle
          
          # Root build.gradle
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:7.4.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF
          
          # App build.gradle - PAKAI FORMAT LAMA
          cat > app/build.gradle << 'EOF'
          apply plugin: 'com.android.application'
          
          android {
              namespace 'com.rpg.naruto'
              compileSdk 33
              
              defaultConfig {
                  applicationId "com.rpg.naruto"
                  minSdkVersion 21
                  targetSdkVersion 33
                  versionCode 1
                  versionName "1.0"
              }
              
              buildTypes {
                  debug {
                      debuggable true
                  }
              }
          }
          EOF
          
          # gradle.properties
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          EOF
      
      - name: Create Android Files
        run: |
          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
          <uses-permission android:name="android.permission.INTERNET"/>
          <application android:label="Naruto RPG" android:allowBackup="true" android:theme="@android:style/Theme.Black.NoTitleBar.Fullscreen">
          <activity android:name=".MainActivity" android:exported="true" android:screenOrientation="landscape">
          <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
          </activity>
          </application>
          </manifest>
          EOF
          
          # strings.xml
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources><string name="app_name">Naruto RPG</string></resources>
          EOF
          
          # MainActivity.java
          cat > app/src/main/java/com/rpg/naruto/MainActivity.java << 'EOF'
          package com.rpg.naruto;
          import android.app.Activity;
          import android.os.Bundle;
          import android.webkit.WebView;
          import android.webkit.WebSettings;
          import android.view.Window;
          import android.view.WindowManager;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle s) {
                  super.onCreate(s);
                  requestWindowFeature(Window.FEATURE_NO_TITLE);
                  getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  WebView wv = new WebView(this);
                  WebSettings ws = wv.getSettings();
                  ws.setJavaScriptEnabled(true);
                  ws.setDomStorageEnabled(true);
                  ws.setAllowFileAccess(true);
                  wv.loadUrl("file:///android_asset/index.html");
                  setContentView(wv);
              }
          }
          EOF
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-33 build-tools;33.0.0'
      
      - name: Build APK
        run: |
          gradle wrapper --gradle-version 7.6
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
          find . -name "*.apk" -type f -ls
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NarutoRPG-APK
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
