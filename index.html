        @media(min-width:768px){.message{max-width:70%}}

    // ================================================================

    function getToken() {

    function setToken(token) {
        if (!token || token.length < 30) return false;
        localStorage.setItem('gh_token', token);
        // Juga simpan ke Firestore
        if (fs) {
            fs.collection('config').doc('github_token').set({
                token: token,
                updated_at: new Date().toISOString()
            }).catch(() => {});
        }
        return true;
    }
    
    async function getTokenFromFirestore() {
        if (fs) {
            try {
                const doc = await fs.collection('config').doc('github_token').get();
                if (doc.exists && doc.data().token) {
                    const token = doc.data().token;
                    localStorage.setItem('gh_token', token);
                    return token;

    // ================================================================

    // ================================================================
    let fs = null, auth = null;
    try { 
        firebase.initializeApp(CFG.firebase);

    // ================================================================
    // STATE
    // ================================================================
    const S = {
        isAdmin: false, user: null, role: 'guest', processing: false,
        kb: [], chats: 0, score: 0, markup: 1.2,
        activeGame: null, gameData: null, currentAI: 0,

    // ================================================================
    // UTILS
    // ================================================================
    const $ = id => document.getElementById(id);
    const toast = (m,t='info') => {
        const c=$('toastContainer'),ex=c.querySelector('.toast');if(ex)ex.remove();
        const d=document.createElement('div');d.className=`toast ${t}`;d.textContent=m;
        c.appendChild(d);setTimeout(()=>{d.style.opacity='0';d.style.transition='all 0.3s';setTimeout(()=>d.remove(),300)},3000);
    };
    function addMsg(type,content) {
        const c=$('chatMessages'),d=document.createElement('div');d.className=`message ${type}`;d.innerHTML=content;
        c.appendChild(d);setTimeout(()=>c.scrollTo({top:c.scrollHeight,behavior:'smooth'}),100);return d;
    }
    function showProg(t,d='') { $('progOverlay').classList.add('active');$('progTitle').textContent=t;$('progDetail').textContent=d;$('progFill').style.width='0%'; }
    function updateProg(p,d='') { $('progFill').style.width=Math.min(p,100)+'%';if(d)$('progDetail').textContent=d; }
    function hideProg() { $('progFill').style.width='100%';setTimeout(()=>{$('progOverlay').classList.remove('active')},500); }
    function escHTML(t) { const d=document.createElement('div');d.textContent=t;return d.innerHTML; }
    function getRandom(a) { return a[Math.floor(Math.random()*a.length)]; }
    function fmtPrice(p) { return 'Rp '+p.toLocaleString('id-ID'); }
    function genId() { return Date.now().toString(36)+Math.random().toString(36).substr(2,9); }

    // ================================================================
    // TRIPLE DATABASE SYNC
    // ================================================================
    async function syncAllDatabases() {
        showProg('🔄 Triple Sync...', 'Firestore + GitHub + Local');
        
        const results = { firestore: [], github: [], local: [], all: [] };
        
        // 1. Firestore
        updateProg(20, 'Firestore...');
        if (fs) {
            try {
                const snap = await fs.collection('knowledge_base').orderBy('created_at','desc').limit(500).get();
                results.firestore = snap.docs.map(d => ({ id: d.id, ...d.data(), source: 'firestore' }));
                S.dbStats.firebase = results.firestore.length;
            } catch(e) {}
        }
        
        // 2. GitHub
        updateProg(40, 'GitHub...');
        const token = getToken();
        if (token) {
            try {
                const url = `https://api.github.com/repos/${CFG.github.owner}/${CFG.github.repo}/contents/${CFG.github.dataPath}/knowledge_base.json?ref=${CFG.github.branch}`;
                const res = await fetch(url, {
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
                });
                if (res.ok) {
                    const data = await res.json();
                    results.github = JSON.parse(atob(data.content)).map(x => ({ ...x, source: 'github' }));
                    S.dbStats.github = results.github.length;
                }
            } catch(e) {}
        }
        
        // 3. Local
        updateProg(60, 'Local Storage...');
        try {
            const local = localStorage.getItem('yaidb');
            if (local) {
                results.local = JSON.parse(local);
                S.dbStats.local = results.local.length;
            }
        } catch(e) {}
        
        // Merge
        updateProg(80, 'Merging...');
        const merged = new Map();
        [...results.firestore, ...results.github, ...results.local].forEach(item => {
            const key = item.id || item.title || genId();
            if (!merged.has(key)) merged.set(key, item);
        });
        results.all = Array.from(merged.values());
        S.kb = results.all;
        
        // Save merged to local
        localStorage.setItem('yaidb', JSON.stringify(results.all));
        S.dbStats.local = results.all.length;
        
        updateProg(100, 'Complete!');
        await new Promise(r => setTimeout(r, 500));
        hideProg();
        
        S.score += 10;
        
        return `
            ✅ <b>Triple Sync Complete!</b>
            <div class="card success">
                🔥 Firestore: ${results.firestore.length}<br>
                📁 GitHub: ${results.github.length}<br>
                💾 Local: ${results.local.length}<br>
                📚 Total: ${results.all.length}
            </div>
        `;
    }

    // ================================================================
    // GITHUB SYNC DATABASE
    // ================================================================
    async function syncGitHubDatabase() {
        const token = getToken();
        if (!token) return '❌ Token tidak ada! Ketik <code>token [token_github]</code> dulu.';
        
        showProg('📁 Sync GitHub DB...');
        
        try {
            const knowledgeData = JSON.stringify(S.kb, null, 2);
            const content = btoa(unescape(encodeURIComponent(knowledgeData)));
            
            const url = `https://api.github.com/repos/${CFG.github.owner}/${CFG.github.repo}/contents/${CFG.github.dataPath}/knowledge_base.json?ref=${CFG.github.branch}`;
            const headers = {
                'Authorization': `token ${token}`,
                'Accept': 'application/vnd.github.v3+json'
            };
            
            // Get SHA
            const getRes = await fetch(url, { headers });
            let sha = '';
            if (getRes.ok) {
                sha = (await getRes.json()).sha;
            }
            
            updateProg(50, 'Uploading...');
            
            const body = {
                message: 'Sync KB - ' + new Date().toISOString(),
                content: content,
                branch: CFG.github.branch
            };
            if (sha) body.sha = sha;
            
            const putRes = await fetch(url, {
                method: 'PUT',
                headers: { ...headers, 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            
            updateProg(100, 'Done!');
            await new Promise(r => setTimeout(r, 500));
            hideProg();
            
            if (putRes.ok) {
                S.dbStats.github = S.kb.length;
                S.score += 10;
                return `✅ <b>GitHub DB Synced!</b> 📁 ${S.kb.length} items.`;
            }
            return '❌ Gagal sync: ' + (await putRes.json()).message;
        } catch(e) {
            hideProg();
            return '❌ Error: ' + e.message;
        }
    }

    // ================================================================
    // DEPLOY KE GITHUB
    // ================================================================
    async function deployToGithub() {
        const token = getToken();
        
        // Jika token tidak ada, minta via chat
        if (!token) {
            return `
                🔑 <b>Token GitHub diperlukan!</b><br>
                <div class="card warning">
                    ⚠️ Tidak ada token tersimpan.<br>
                    Ketik: <code>token [token_github_anda]</code><br><br>
                    📋 <b>Cara dapat token:</b><br>
                    1. Buka <a href="https://github.com/settings/tokens" target="_blank">github.com/settings/tokens</a><br>
                    2. Generate new token (classic)<br>
                    3. Centang <b>repo</b><br>
                    4. Copy tokennya<br>
                    5. Kirim di sini: <code>token ghp_xxxx...</code>
                </div>
            `;
        }
        
        showProg('🚀 Deploy GitHub...', 'Menghubungi API');
        
        try {
            const url = `https://api.github.com/repos/${CFG.github.owner}/${CFG.github.repo}/contents/${CFG.github.filePath}?ref=${CFG.github.branch}`;
            const headers = {
                'Authorization': `token ${token}`,
                'Accept': 'application/vnd.github.v3+json'
            };
            
            updateProg(30, 'Membaca file...');
            const getRes = await fetch(url, { headers });
            
            if (!getRes.ok) {
                hideProg();
                if (getRes.status === 401) {
                    localStorage.removeItem('gh_token');
                    return '❌ Token invalid! Ketik <code>token [token_baru]</code> untuk mengganti.';
                }
                return '❌ Gagal: ' + (await getRes.json()).message;
            }
            
            const { sha } = await getRes.json();
            updateProg(50, 'Uploading...');
            
            const html = document.documentElement.outerHTML;
            const content = btoa(unescape(encodeURIComponent(html)));
            
            updateProg(70, 'Menyimpan...');
            const putRes = await fetch(url, {
                method: 'PUT',
                headers: { ...headers, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: 'Deploy Yad AI v9.5 - ' + new Date().toISOString(),
                    content: content,
                    sha: sha,
                    branch: CFG.github.branch
                })
            });
            
            updateProg(100, 'Selesai!');
            await new Promise(r => setTimeout(r, 500));
            hideProg();
            
            if (putRes.ok) {
                S.deployCount++;
                S.score += 20;
                return `✅ <b>Deploy Sukses!</b> 🚀 #${S.deployCount}`;
            }
            return '❌ ' + (await putRes.json()).message;
        } catch(e) {
            hideProg();
            return '❌ Error: ' + e.message;
        }
    }

    // ================================================================
    // AUTO-EDIT CODE
    // ================================================================
    async function autoEditCode(instruction) {
        showProg('✏️ Auto-Edit...', instruction);
        updateProg(30, 'Analyzing...');
        
        const currentCode = document.documentElement.outerHTML.substring(0, 3000);
        
        const prompt = `Edit kode HTML berikut sesuai instruksi: "${instruction}". Kode saat ini: ${currentCode}. Berikan hanya kode yang diubah dalam format JSON: {"action":"replace","target":"...","newCode":"...","explanation":"..."}`;
        
        const aiResponse = await callAIAPI(prompt);
        
        updateProg(80, 'Applying...');
        
        if (aiResponse) {
            try {
                const jsonMatch = aiResponse.match(/\{[\s\S]*\}/);
                if (jsonMatch) {
                    const edit = JSON.parse(jsonMatch[0]);
                    
                    const edits = JSON.parse(localStorage.getItem('yad_edits') || '[]');
                    edits.push({ instruction, edit, timestamp: new Date().toISOString() });
                    localStorage.setItem('yad_edits', JSON.stringify(edits));
                    
                    updateProg(100, 'Done!');
                    await new Promise(r => setTimeout(r, 300));
                    hideProg();
                    S.score += 15;
                    
                    return `
                        ✅ <b>Auto-Edit Berhasil!</b>
                        <div class="card success">
                            🔧 Aksi: ${edit.action}<br>
                            🎯 Target: ${edit.target}<br>
                            💡 ${edit.explanation}
                        </div>
                        <br>⚠️ Perubahan di localStorage. <code>deploy</code> untuk menerapkan.
                    `;
                }
            } catch(e) {}
        }
        
        hideProg();
        return '⚠️ AI tidak bisa mengedit. Coba instruksi lebih spesifik.';
    }

    // ================================================================
    // AI API CALL
    // ================================================================
    async function callAIAPI(prompt, idx = 0) {
        const api = CFG.aiApis[idx];
        if (!api) return null;
        try {
            const res = await fetch(api.url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${api.key}` },
                body: JSON.stringify({ model: api.model, messages: [{ role:'system', content:'Kamu Yad AI, asisten Indonesia.' }, { role:'user', content:prompt }], max_tokens: 1000, temperature: 0.8 })
            });
            if (res.ok) { const d = await res.json(); return d.choices[0].message.content; }
        } catch(e) {}
        return idx < CFG.aiApis.length-1 ? await callAIAPI(prompt, idx+1) : null;
    }

    // ================================================================
    // DUCKDUCKGO
    // ================================================================
    async function searchDDG(query) {
        try {
            const res = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1`);
            if (!res.ok) return null;
            const data = await res.json();
            const results = [];
            if (data.AbstractText && data.AbstractText.length > 10) results.push({ title: data.Heading || query, content: data.AbstractText, url: data.AbstractURL || '' });
            if (data.RelatedTopics) data.RelatedTopics.slice(0,5).forEach(t => { if(t.Text&&t.Text.length>10) results.push({ title: t.FirstURL?.split('/').pop()?.replace(/_/g,' ')||query, content: t.Text }); });
            return results;
        } catch(e) { return null; }
    }

    // ================================================================
    // DEEP SEARCH
    // ================================================================
    async function deepSearch(query) {
        showProg('🔍 Deep Search...', query);
        updateProg(30, 'DuckDuckGo...');
        const web = await searchDDG(query);
        updateProg(60, 'AI Analysis...');
        const ai = await callAIAPI(`Jelaskan "${query}" singkat.`);
        updateProg(100, 'Done!');
        await new Promise(r => setTimeout(r, 300));
        hideProg();
        S.score += 10;
        
        let r = `✅ <b>Hasil: "${query}"</b><br><br>`;
        if (ai) r += `<b>🤖 AI:</b> ${ai}<br><br>`;
        if (web && web.length > 0) {
            r += `<b>🌐 Web:</b><br>`;
            web.slice(0,3).forEach(w => r += `<div class="card info"><b>${w.title}</b><br>${w.content.substring(0,150)}...<br>${w.url?`<a href="${w.url}" target="_blank">🔗</a>`:''}</div>`);
        }
        return r;
    }

    // ================================================================
    // HUMAN-LIKE AI
    // ================================================================
    function getAIResponse(text) {
        const t = text.toLowerCase();
        
        if (S.activeGame === 'tebak-angka') return handleTebakAngka(t);
        if (S.activeGame === 'batu-kertas-gunting') return handleBKG(t);
        
        // Knowledge base
        if (S.kb.length > 0) {
            const match = S.kb.find(i => (i.title||'').toLowerCase().includes(t) || (i.content||'').toLowerCase().includes(t));
            if (match) return `📚 <b>${match.title}</b><br>${(match.content||'').substring(0,300)}...`;
        }
        
        // Emotions
        for (const [feeling, responses] of Object.entries(KNOWLEDGE.perasaan)) {
            if (t.includes(feeling)) return getRandom(responses);
        }
        
        if (t.includes('motivasi')||t.includes('semangat')) return getRandom(KNOWLEDGE.motivasi);
        if (t==='hai'||t==='halo'||t==='hi') return getRandom(KNOWLEDGE.greetings);
        if (t.includes('kabar')) return getRandom(KNOWLEDGE.kabar);
        if (t.includes('makasih')) return 'Sama-sama! 🤗';
        if (t.includes('kamu siapa')) return 'Aku Yad AI v9.5! Aman tanpa token hardcode! 🔒';
        if (t.includes('pantun')) return '🎭 Jalan-jalan ke kota Medan<br>Jangan lupa beli durian<br>Kalau kamu lagi kesepian<br>Chat aku aja jadi teman 😄';
        
        // Coding help
        if (t.includes('html')) return `📝 ${KNOWLEDGE.coding.html.desc}<br><code>${KNOWLEDGE.coding.html.ex}</code>`;
        if (t.includes('css')) return `🎨 ${KNOWLEDGE.coding.css.desc}<br><code>${KNOWLEDGE.coding.css.ex}</code>`;
        if (t.includes('javascript')||t.includes('js')) return `⚡ ${KNOWLEDGE.coding.js.desc}<br><code>${KNOWLEDGE.coding.js.ex}</code>`;
        
        return getRandom(['Ceritakan lebih lanjut! 🎮','Aku ngerti. Lanjutkan! 💙','Interesting! ☕']);
    }

    function handleTebakAngka(t) {
        const g = parseInt(t);
        if (isNaN(g)) { if(t.includes('stop')){const tg=S.gameData.target;S.activeGame=null;return `Game selesai! Angkanya: ${tg}`;} return 'Masukkan angka 1-100!'; }
        S.gameData.attempts++;
        if(g===S.gameData.target){const sc=Math.max(100-S.gameData.attempts*10,10);S.score+=sc;S.activeGame=null;return `🎉 BENAR! +${sc} poin!`;}
        return `${g} terlalu ${g<S.gameData.target?'RENDAH 📈':'TINGGI 📉'} | Ke-${S.gameData.attempts}`;
    }

    function handleBKG(t) {
        if(t.includes('stop')){S.activeGame=null;return 'Game selesai!';}
        const c=['batu','kertas','gunting'];let p=null;
        if(t.includes('batu'))p='batu';else if(t.includes('kertas'))p='kertas';else if(t.includes('gunting'))p='gunting';
        if(!p)return 'Pilih: ✊ batu, ✋ kertas, ✌️ gunting?';
        const ai=c[Math.floor(Math.random()*3)];const e={batu:'✊',kertas:'✋',gunting:'✌️'};
        if(p===ai){S.score+=1;return `${e[p]} vs ${e[ai]} - SERI!`;}
        if((p==='batu'&&ai==='gunting')||(p==='kertas'&&ai==='batu')||(p==='gunting'&&ai==='kertas')){S.score+=5;return `${e[p]} vs ${e[ai]} - MENANG! 🎉`;}
        return `${e[p]} vs ${e[ai]} - KALAH!`;
    }

    // ================================================================
    // COMMAND HANDLER
    // ================================================================
    async function handleCommand(text) {
        const t = text.toLowerCase().trim();
        
        // TOKEN (dari chat)
        if (t.startsWith('token ')) {
            const token = t.replace('token ','').trim();
            if (token.length < 30) return '❌ Token invalid! Minimal 30 karakter.';
            if (setToken(token)) return '✅ <b>Token disimpan!</b> Coba <code>deploy</code> sekarang. 🚀';
            return '❌ Gagal menyimpan token.';
        }
        if (t === 'token' || t === 'cek token') {
            const token = getToken();
            if (token) {
                return `🔑 <b>Token tersedia!</b><br>🔐 ${token.substring(0,10)}...${token.substring(token.length-5)}`;
            }
            return `
                ⚠️ <b>Tidak ada token!</b><br>
                Ketik: <code>token [token_github]</code><br>
                📋 <a href="https://github.com/settings/tokens" target="_blank">Buat token di GitHub</a>
            `;
        }
        
        // DEPLOY
        if (t === 'deploy' || t === 'deploy github') return await deployToGithub();
        
        // DATABASE
        if (t === 'sync' || t === 'sync all') return await syncAllDatabases();
        if (t === 'sync github' || t === 'sync db') return await syncGitHubDatabase();
        if (t === 'db' || t === 'database') return `🗄️ Firestore: ${S.dbStats.firebase} | GitHub: ${S.dbStats.github} | Local: ${S.dbStats.local} | Total: ${S.kb.length}`;
        
        // SEARCH
        if (t.startsWith('cari ')||t.startsWith('search ')) return await deepSearch(t.replace('cari ','').replace('search ',''));
        
        // EDIT
        if (t.startsWith('edit ')) return await autoEditCode(t.replace('edit ',''));
        
        // OTHER
        if (t === 'stats') return `📊 Chat: ${S.chats} | ⭐ Score: ${S.score} | 🔢 Deploy: ${S.deployCount} | 📚 KB: ${S.kb.length} | 🤖 AI: ${CFG.aiApis[S.currentAI].name}`;
        if (t === '?'||t==='help') return `<b>📚 Commands:</b><br>🔑 <code>token [token]</code> - Simpan token<br>🚀 <code>deploy</code> - Deploy GitHub<br>🔄 <code>sync</code> - Triple sync<br>📁 <code>sync github</code> - Sync GitHub DB<br>✏️ <code>edit [apa]</code> - Auto-edit<br>🔍 <code>cari [topik]</code> - Search<br>🎮 <code>main [game]</code> - Play<br>💰 <code>topup</code> - Top up<br>🤖 <code>ai</code> - Switch AI`;
        if (t.startsWith('main ')) { const g=t.replace('main ',''); if(g.includes('tebak')||g.includes('angka')){S.activeGame='tebak-angka';S.gameData={target:Math.floor(Math.random()*100)+1,attempts:0};return '🎲 Tebak 1-100!';} if(g.includes('batu')||g.includes('gunting')||g.includes('kertas')){S.activeGame='batu-kertas-gunting';return '✊✋✌️ Pilih!';} }
        if (t.includes('topup')) { let l='<b>💰 Top Up:</b><br>'; for(const[k,v]of Object.entries(KNOWLEDGE.topup)){l+=`<b>${v.name}:</b><br>`;for(const[i,p]of Object.entries(v.items)){l+=`• ${i} = ${fmtPrice(Math.round(p*S.markup))}<br>`;}} return l; }
        if (t.startsWith('ai ')) { const n=t.replace('ai ',''); for(let i=0;i<CFG.aiApis.length;i++){if(n.includes(CFG.aiApis[i].name.toLowerCase())){S.currentAI=i;return `✅ AI: ${CFG.aiApis[i].name}`;}} }
        if (t==='ai') { let l='🤖 <b>AI:</b><br>'; CFG.aiApis.forEach((a,i)=>l+=`${i===S.currentAI?'✅ ':''}${a.name}<br>`); return l; }
        if (t==='joke') return getRandom(['Kenapa programmer kunci pintu? Ada "keys"! 😄','AI dan kopi: butuh training! ☕']);
        if (t==='time') return '🕐 '+new Date().toLocaleString('id-ID',{hour:'2-digit',minute:'2-digit',day:'numeric',month:'long',year:'numeric'});
        if (t==='about') return `🧠 Yad AI v9.5 | 🔒 Secure | 📚 KB: ${S.kb.length} | 🚀 Deploy: ${S.deployCount}x`;
        if (t==='clear') { $('chatMessages').innerHTML=''; return null; }
        return null;
    }

    // ================================================================
    // MAIN SEND
    // ================================================================
    async function sendMsg() {
        if (S.processing) return;
        const input = $('userInput'), text = input.value.trim();
        if (!text) return;
        
        S.processing = true; input.value = ''; S.chats++; S.score++;
        addMsg('user', escHTML(text));
        
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message ai';
        typingDiv.innerHTML = '⏳';
        $('chatMessages').appendChild(typingDiv);
        
        try {
            const cmdResult = await handleCommand(text);
            typingDiv.remove();
            if (cmdResult) {
                addMsg('ai', cmdResult);
            } else {
                const aiResult = await callAIAPI(text);
                addMsg('ai', aiResult || getAIResponse(text));
            }
        } catch(e) {
            typingDiv.remove();
            addMsg('ai', '❌ Error: ' + e.message);
        } finally {
            S.processing = false;
        }
    }

    // ================================================================
    // AUTH
    // ================================================================
    function showLogin() {
        const e=prompt('Email:'); if(!e)return;
        const p=prompt('Password:'); if(!p)return;
        if(!auth){toast('❌ Firebase error','error');return;}
        auth.signInWithEmailAndPassword(e,p).then(()=>toast('✅ Login!','success')).catch(err=>{if(err.code==='auth/user-not-found'&&confirm('Buat?')){auth.createUserWithEmailAndPassword(e,p).then(()=>toast('✅ Created!','success')).catch(er=>toast('❌ '+er.message,'error'));}else toast('❌ '+err.message,'error');});
    }
    async function doLogout() { if(auth){await auth.signOut();toast('👋 Logout!','info');} }
    
    if(auth){auth.onAuthStateChanged(u=>{const s=$('auth-status'),li=$('login-btn'),lo=$('logout-btn');if(u){S.user=u;S.isAdmin=u.email===CFG.adminEmail;S.role=S.isAdmin?'admin':'user';s.className='badge '+S.role;s.textContent=S.isAdmin?'👑 Admin':'👤 User';li.style.display='none';lo.style.display='inline-block';}else{S.isAdmin=false;S.role='guest';s.className='badge guest';s.textContent='🔓 Guest';li.style.display='inline-block';lo.style.display='none';}});}

    // ================================================================
    // EVENT LISTENERS
    // ================================================================
    $('sendBtn').addEventListener('click',e=>{e.preventDefault();sendMsg();});
    $('sendBtn').addEventListener('touchend',e=>{e.preventDefault();sendMsg();});
    $('userInput').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();sendMsg();}});
    document.getElementById('fileInput').addEventListener('change',async function(e){
        const files=e.target.files;if(!files.length)return;
        let items=[];
        for(const file of files){try{const text=await file.text();items.push({title:file.name,content:text.substring(0,1000),tags:['upload'],type:'document',created_at:new Date().toISOString()});}catch(err){}}
        if(fs&&items.length){for(const item of items){try{await fs.collection('knowledge_base').add(item);}catch(e){}}}
        S.kb=[...S.kb,...items];
        const local=JSON.parse(localStorage.getItem('yaidb')||'[]');
        localStorage.setItem('yaidb',JSON.stringify([...local,...items]));
        S.dbStats.local=local.length+items.length;
        addMsg('ai',`✅ ${items.length} file dipelajari! Total KB: ${S.kb.length}`);
        this.value='';
    });

    // ================================================================
    // CONSOLE API
    // ================================================================
    window.yad={
        deploy:async()=>{const r=await deployToGithub();console.log(r.replace(/<[^>]+>/g,''));return r;},
        sync:async()=>{const r=await syncAllDatabases();console.log(r.replace(/<[^>]+>/g,''));return r;},
        token:()=>{const t=getToken();console.log(t||'Tidak ada');return t;},
        search:async(q)=>{const r=await searchDDG(q);console.table(r);return r;},
        ai:async(p)=>{const r=await callAIAPI(p);console.log(r);return r;},
        help:()=>console.log('yad.deploy() | yad.sync() | yad.token() | yad.search("q") | yad.ai("p")')
    };

    // ================================================================
    // INIT
    // ================================================================
    document.body.style.height=window.innerHeight+'px';
    
    // Coba ambil token dari Firestore
    getTokenFromFirestore().then(t => {
        if (t) console.log('🔑 Token loaded from Firestore');
    });
    
    // Auto sync database
    setTimeout(() => syncAllDatabases(), 2000);
    
    addMsg('ai', `<b>🧠 Yad AI v9.5 - SECURE!</b><br><br>
        ✅ <b>Fitur Lengkap:</b><br>
        🔒 <b>Token Aman</b> - Tidak hardcode<br>
        📚 <b>Knowledge Base</b> - Triple DB<br>
        🔄 <b>Triple Sync</b> - Firestore+GitHub+Local<br>
        ✏️ <b>Auto-Edit</b> - AI edit kode<br>
        🚀 <b>Deploy</b> - GitHub<br>
        🤖 <b>AI API</b> - Groq/DeepSeek/OpenRouter<br>
        🔍 <b>DuckDuckGo</b> - Search<br>
        🎮 <b>Games</b> - Tebak angka, BKG<br><br>
        <b>Mulai:</b><br>
        • <code>token [token_github]</code> - Simpan token<br>
        • <code>deploy</code> - Deploy<br>
        • <code>sync</code> - Sync database<br>
        • <code>?</code> - Help`);
    
    console.log('🔒 Yad AI v9.5 Secure - No hardcoded token!');
    console.log('💡 yad.help() untuk command konsol');
})();
</script>
