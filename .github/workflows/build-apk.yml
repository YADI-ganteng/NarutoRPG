name: Build APK with Buildozer

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@v4
    - name: Install Dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq openjdk-17-jdk python3-pip autoconf automake libtool
        pip install buildozer cython==0.29.37
    - name: Build APK
      run: |
        buildozer android debug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NarutoRPG-APK
        path: "*.apk"
        if-no-files-found: warn
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: "*.apk"
        tag_name: buildozer-build
        name: "Buildozer APK Build"
        body: "APK built with Buildozer on GitHub Actions"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
