name: Auto-Fix & Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
    
    - name: 🔍 STEP 1 - ANALISIS PROJECT
      run: |
        echo "========================================="
        echo "  🔍 ANALISIS PROJECT"
        echo "========================================="
        
        ISSUES=0
        FIXES=0
        
        # Cek main.py
        if [ ! -f "main.py" ]; then
          echo "❌ main.py TIDAK ADA"
          ISSUES=$((ISSUES+1))
        else
          echo "✅ main.py ADA ($(wc -l < main.py) lines)"
          
          # Cek apakah ada import kivy
          if grep -q "from kivy" main.py; then
            echo "   ✅ Import kivy OK"
          else
            echo "   ❌ Tidak ada import kivy!"
            ISSUES=$((ISSUES+1))
          fi
          
          # Cek apakah ada App
          if grep -q "class.*App" main.py; then
            echo "   ✅ Class App OK"
          else
            echo "   ❌ Tidak ada App class!"
            ISSUES=$((ISSUES+1))
          fi
        fi
        
        # Cek buildozer.spec
        if [ ! -f "buildozer.spec" ]; then
          echo "❌ buildozer.spec TIDAK ADA"
          ISSUES=$((ISSUES+1))
        else
          echo "✅ buildozer.spec ADA"
          
          # Cek source.include_exts
          if grep -q "source.include_exts" buildozer.spec; then
            EXTS=$(grep "source.include_exts" buildozer.spec)
            echo "   📝 $EXTS"
            if echo "$EXTS" | grep -q "py"; then
              echo "   ✅ .py included"
            else
              echo "   ❌ .py NOT included!"
              ISSUES=$((ISSUES+1))
            fi
          fi
          
          # Cek requirements
          if grep -q "requirements" buildozer.spec; then
            REQS=$(grep "requirements" buildozer.spec | head -1)
            echo "   📝 $REQS"
            if echo "$REQS" | grep -q "kivy"; then
              echo "   ✅ kivy in requirements"
            else
              echo "   ❌ kivy NOT in requirements!"
              ISSUES=$((ISSUES+1))
            fi
          fi
        fi
        
        # Cek Python version
        PYVER=$(python3 --version 2>&1)
        echo "🐍 $PYVER"
        
        # Cek Java
        if command -v java &> /dev/null; then
          JVER=$(java -version 2>&1 | head -1)
          echo "☕ $JVER"
        else
          echo "❌ Java TIDAK ADA!"
          ISSUES=$((ISSUES+1))
        fi
        
        echo ""
        echo "📊 TOTAL ISSUES: $ISSUES"
        echo "issues=$ISSUES" >> $GITHUB_ENV
    
    - name: 🔧 STEP 2 - AUTO-FIX
      run: |
        echo "========================================="
        echo "  🔧 AUTO-FIX"
        echo "========================================="
        
        # Fix 1: Buat main.py jika tidak ada
        if [ ! -f "main.py" ]; then
          echo "🔧 Membuat main.py..."
          cat > main.py << 'PYEOF'
from kivy.app import App
from kivy.uix.widget import Widget
from kivy.uix.button import Button
from kivy.uix.label import Label
from kivy.uix.boxlayout import BoxLayout
from kivy.graphics import Color, Rectangle, Ellipse
from kivy.core.window import Window
from kivy.clock import Clock
from random import randint

Window.size = (800, 480)

class GameWidget(Widget):
    def __init__(self, **k):
        super().__init__(**k)
        self.p = {'x':400,'y':240,'hp':500,'mhp':500,'cp':200,'gold':1000,'lv':1,'kl':0,'sp':5}
        self.en = [{'x':randint(50,750),'y':randint(50,430),'hp':100,'al':True,'n':f'Enemy {i}'} for i in range(10)]
        self.it = [{'x':randint(100,700),'y':randint(100,380),'t':'💰','c':False} for _ in range(10)]
        self.ks = set()
        Window.bind(on_key_down=lambda w,k,*_:self.ks.add(k))
        Window.bind(on_key_up=lambda w,k,*_:self.ks.discard(k))
        Clock.schedule_interval(self.up, 1/60)
    
    def atk(self):
        for e in self.en:
            if not e['al']: continue
            if abs(self.p['x']-e['x'])<80:
                e['hp'] -= 40
                if e['hp']<=0: e['al']=False; self.p['kl']+=1; self.p['gold']+=randint(20,70)
                break
    
    def up(self, dt):
        if 275 in self.ks: self.p['x'] += self.p['sp']
        if 276 in self.ks: self.p['x'] -= self.p['sp']
        if 273 in self.ks: self.p['y'] += self.p['sp']
        if 274 in self.ks: self.p['y'] -= self.p['sp']
        if 293 in self.ks: self.atk()
        self.p['x'] = max(20, min(780, self.p['x']))
        self.p['y'] = max(20, min(460, self.p['y']))
        for i in self.it:
            if not i['c'] and abs(self.p['x']-i['x'])<25: i['c']=True; self.p['gold']+=100
        if self.p['cp'] < 200: self.p['cp'] += 0.05
        self.draw()
    
    def draw(self):
        self.canvas.clear()
        with self.canvas:
            Color(0.1,0.1,0.2); Rectangle(pos=(0,0),size=(800,480))
            Color(0.2,0.5,0.2); Rectangle(pos=(0,0),size=(800,80))
            for i in self.it:
                if not i['c']: Color(1,1,0,0.9); Ellipse(pos=(i['x']-10,i['y']-10),size=(20,20))
            for e in self.en:
                if not e['al']: continue
                Color(0.8,0.2,0.2); Rectangle(pos=(e['x']-15,e['y']-20),size=(30,40))
                Color(1,0.7,0.5); Ellipse(pos=(e['x']-10,e['y']-30),size=(20,20))
            Color(1,0.42,0.2); Rectangle(pos=(self.p['x']-15,self.p['y']-25),size=(30,45))
            Color(1,0.8,0.6); Ellipse(pos=(self.p['x']-12,self.p['y']-38),size=(24,24))
            Color(0,0.8,0.3); Rectangle(pos=(self.p['x']-22,self.p['y']-48),size=(44*self.p['hp']/500,5))

class NarutoApp(App):
    def build(self):
        l = BoxLayout(orientation='vertical')
        self.hud = Label(text='Naruto RPG', size_hint=(1,0.1), color=(1,1,1,1))
        self.g = GameWidget()
        l.add_widget(self.hud); l.add_widget(self.g)
        btn = Button(text='👊 ATTACK', size_hint=(1,0.15), background_color=(1,0.2,0.2,1))
        btn.bind(on_press=lambda x: self.g.atk())
        l.add_widget(btn)
        Clock.schedule_interval(lambda dt: self.upd(), 0.2)
        return l
    
    def upd(self):
        p = self.g.p
        self.hud.text = f'❤️ {int(p["hp"])} | 💙 {int(p["cp"])} | 💰 {p["gold"]} | ⭐ Lv.{p["lv"]} | 👹 {p["kl"]}'

if __name__ == '__main__':
    NarutoApp().run()
PYEOF
          echo "✅ main.py DIBUAT!"
        fi
        
        # Fix 2: Buat buildozer.spec jika tidak ada
        if [ ! -f "buildozer.spec" ]; then
          echo "🔧 Membuat buildozer.spec..."
          buildozer init 2>/dev/null || true
        fi
        
        # Fix 3: Perbaiki buildozer.spec
        if [ -f "buildozer.spec" ]; then
          echo "🔧 Memperbaiki buildozer.spec..."
          sed -i 's/title = .*/title = Naruto RPG/' buildozer.spec
          sed -i 's/package.name = .*/package.name = narutorpg/' buildozer.spec
          sed -i 's/source.include_exts = .*/source.include_exts = py/' buildozer.spec
          sed -i 's/requirements = .*/requirements = python3,kivy==2.2.1/' buildozer.spec
          sed -i 's/# android.arch = armeabi-v7a/android.arch = armeabi-v7a/' buildozer.spec
          sed -i 's/android.accept_sdk_license = False/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/android.allow_download_worker = False/android.allow_download_worker = True/' buildozer.spec
          echo "✅ buildozer.spec DIPERBAIKI!"
        fi
        
        # Fix 4: Install Java jika tidak ada
        if ! command -v java &> /dev/null; then
          echo "🔧 Menginstall Java..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jdk
          echo "✅ Java terinstall!"
        fi
        
        echo ""
        echo "✅ AUTO-FIX SELESAI!"
    
    - name: 🔨 STEP 3 - BUILD APK
      run: |
        echo "========================================="
        echo "  🔨 BUILDING APK"
        echo "========================================="
        
        pip install buildozer cython==0.29.37 2>&1 | tail -2
        
        echo "⏳ Building... (15-25 menit)"
        buildozer android debug 2>&1 | while IFS= read -r line; do
          if echo "$line" | grep -qE "SUCCESS|ERROR|APK available|FAILED"; then
            echo ">>> $line"
          fi
        done
        
        echo ""
        echo "=== HASIL BUILD ==="
        find . -name "*.apk" -type f -ls
    
    - name: 📤 STEP 4 - UPLOAD APK
      uses: actions/upload-artifact@v4
      with:
        name: NarutoRPG-AutoFix-APK
        path: "**/*.apk"
        if-no-files-found: warn
    
    - name: 📊 STEP 5 - BUILD REPORT
      run: |
        echo "========================================="
        echo "  📊 BUILD REPORT"
        echo "========================================="
        
        if find . -name "*.apk" -type f | grep -q .; then
          echo "✅ BUILD SUKSES!"
          find . -name "*.apk" -type f -exec ls -la {} \;
        else
          echo "❌ BUILD GAGAL!"
          echo "📋 Cek log:"
          find . -name "*.log" -type f -exec tail -10 {} \; 2>/dev/null
        fi
